body:
  text: 分甘餘話雜家類三雜說之屬提要臣等謹案分甘餘話四卷國朝王士禎撰士禎有池北偶談諸書俱已著録此書成於康熙己丑罷刑部尚書家居之時曰分甘者取王羲之與謝萬書中語也随筆記録瑣事為多盖年逾七十借以消閒遣日無復考證之功故不能如池北偶談居易録之詳核中如引懶真子稱漢書昌邑王賀妾名羅紂即羅敷不言二字何以通用俟考云云今案漢書昌邑王傳實作羅紨師古注曰紨音敷説文糸字部有此字注曰布也一曰粗紬从糸付聲防無切盖紨敷音同故得與敷字通用懶真子悞引漢書士禎不加辨正而轉以致疑殊為疎舛是亦随時摘録不暇繙檢之明騐其他傳問之語偶然登載亦多有未可盡慿者然如繁臺之當讀蒲禾切梅福為吳門市卒之非蘇州宣室之有二此類皆有典據不同摭拾披沙揀寶尚往往遇之其中滄浪詩話一條獨舉馮班鈍吟雜録之説反覆詆排不遺餘力則以士禎論詩宗嚴羽而趙執信論詩宗馮班核其年月在談龍録初出之時故攻班正所以攻執信此固詞人門户之見猶有未化然所云不渉理路不落言詮者自是詩家宗㫖士禎力持其説固亦不為無見焉乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀分甘餘話序昔王右軍在東中與吏部郎謝萬書云頃東游還修植桑果今盛敷榮率諸子抱弱孫游觀其間有一味之甘割而分之以娱目前雖植德無殊邈猶欲教養子孫以敦厚退讓庶令舉策數馬彷彿萬石之風云云僕少時讀之已有味乎其言七十歸田讀書之暇輒提抱弱孫以為樂其稍長者年甫十嵗已能通易書詩三經紙牕竹屋常卧聴其咿唔之聲不覺欣然而喜夫人幼而志學意在逢世下而黄散上而令僕以為至足矣僕生逢聖世仕宦五十載叨冒尚書年踰七袠邇來作息田間又六載矣雖耳聾目眊猶不廢書有所見聞輒復掌録題曰分甘餘話庶使子孫輩知老人晚年所樂在此爾不敢謂如袁伯業老而好學也己丑臘月朔王士禎書
