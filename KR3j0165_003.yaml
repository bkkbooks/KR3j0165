body:
  text: 分甘餘話卷三刑部尚書王士禎撰濰縣老儒楊青藜字祿客又字石民與安邱故相劉公憲石正宗老友也相國假歸招之不往答書略曰側聞直指程君按部安邱與尊伻並轡入城觀者莫不駭異閣下能無懼乎閣下之所居與閣下之所行衆忌之而欲甘心焉者匪朝夕矣乃知進而不知退知存而不知亡竊為閣下危之某伏處草澤稍有異聞如龔芝麓之鐫十三級則以蜀雒分黨也趙韞退之坎壈終身則以避馬未逺也周櫟園之擬立斬則以報復睚眦也陳百史之無辜伏法則以爭權競進也其他訛傳尚多事關鴻巨有傷國體有干名教諒閣下所必不肯為者愚不敢輕信而妄言之即此數端亦足以招悔尤而犯清議矣云云未幾而劉被禍甚烈楊亦霍氏之徐福云近無錫秦氏摹宋刻小本九經剞劂最精㸃畫不茍聞其版已為大力者負之而趨余曾見宋刻於倪檢討雁園粲所與秦刻方幅正同然青出於藍而青於藍矣先太師大司馬公嘗刻小本玉壺氷細入毫髮都穆元敬所著也又文選刪注及趙松雪文集先方伯贈大司寇公常刻賈侍郎三近滑耀編即文府滑稽之流又張南湖綖詩餘圖譜少游南湖詩餘合刻二公皆高郵人也今版皆燬於兵燹余所見者僅此略記其目以示後人先高祖太僕忠勤公遺墨止有采三殿大木於黔中時所為祝嘏詞及史論數篇先曾祖大司徒公著述有炳燭編攝生編百警編皆門生郭文毅明龍正域為序及諫議疏稿先伯祖大司馬公著述有皇祖開天玉律并進疏經理牂牁奏議總督宣大奏議大半載陳大樽子龍經世八編而混入太倉王少司馬思質忬疏數篇弇州先生父也舛訛當改正本兵及署太宰奏議無專刻今邑志略載數篇先祖方伯贈大司寇公著述羣芳譜最著康熙四十六年特旨命翰林官汪灝張逸少等四人續廣之又御製序文冠諸編首餘如剪桐載筆操觚勦說心賞編日省録救荒成法舉業津梁等凡十餘種先伯父侍御公著述有隴首集先兄吏部西樵有然脂集二百卷十笏草堂集西湖竹枝三舟倡和詞與宋荔裳琬曹顧菴爾堪廣陵倡和詞與陳其年維嵩等先仲兄禮吉有抱山堂集先叔兄叔子有古鉢集皆已刻梓又從叔祖郡丞定宇公迂園集少司馬立宇公西臺奏議巡撫奏議吏部季木公問山亭集齊音李杜詩評大寧令用晦有鶴隱集從伯文玉籠鵝館集余嘗欲録其簡要合為一編藏之家孰奔走四方卒卒未暇今老矣未必能終踐此志聊志其目存之家乘云近歲御史以骨鯁著聞者二人宜興任𢎞嘉丹陽荆元實一日上命閣臣集九卿科道問一總漕才品治狀衆相顧未發任從末班抗聲曰某貪酷暴橫無一善狀內閣授筆札持以入告總漕者隨罷黜公論快之任內升通參謝病歸荆封事十餘上皆徑直有聲於時忽引疾乞歸時余初代匱總憲力挽留之不得竟歿於天津舟中可惜也旗下滿洲人准鄉㑹試自順治壬辰科始康熙中停止數科後復舊遂行至今然其例先後不同順治中滿人漢人分為二榜壬辰滿狀元麻勒吉漢狀元鄒忠倚乙未滿狀元圖爾宸漢狀元史大成康熙庚戌科以後則滿漢人同一榜皆試漢文矣麻官至江南江西總督刑部侍郎圖官至陜西巡撫工部侍郎春秋耐班食於耐門因為耐氏按耐今吾邑東時水也水經注時水自西安城西南分為二枝津别出西流德㑹水注之耐水即時水左傳齊晉盟於耐京相璠曰今臨淄唯有澅水西流入泲即濟字地理志曰耐如聲相似澅水即如水蓋以澅與時合得通稱矣漢功臣表宣曲侯耐為鬼薪耐輕刑也音奈按耐班宋人耐門當是宋地非耐水矣曹東畝論詩曰四靈詩如啖玉腴雖爽不飽江西詩如百寶頭羮充口適腹余謂此齊人管晏之見耳四靈如襪材窘於方幅江西以山谷為初祖然東坡云魯直詩如啖江瑤柱多食則發風氣唐大厯十才子傳聞不一江鄰幾所志乃盧綸錢起郎士元司空曙李益李端李嘉祐皇甫曾耿湋苗發吉中孚共十一人或又云有夏侯審按發審詩名不甚著未可與諸子頡頏且皇甫兄弟齊名不應有曾而無冉又韓翃同時盛名而亦不之及皆不可解近科以來海內名士登第無遺惟武林吳寶崖陳琰廣陵殷彥來譽慶尚困場屋時論惜之余乙酉冬賦二詩寄寶崖宋牧仲冡宰見之即延致於家盛為推挽彥來時客關中余亦有書寄之其略云頃江浙間獻詩行在蒙被知遇者多有何吾彥來竟爾寂寂也又一書云比來釋屩立致青雲者何限而彥來之才望一鄉舉不啻千佛名經天之厄才如此知復何意雖然遇合有時如二君者正復捉鼻憾不免耳昔人或以堯舜為諡人多疑其說劉原父五十諡法一篇又云神化無方曰尼耄期稱道曰聃巵言日出曰周然則周公孔子及老子皆以諡稱乎較堯舜之說尤穿鑿而妄矣且厯代以來亦曾有諡堯舜周尼聃者否原父最為博雅此說乃無稽恐誤學者故辨之耿道見字隱之東郡人能古文常作真止和尚塔銘云和尚初名幻修號雁汊晚更字真止本儒家二十後喜讀西方書於楞嚴圓覺多所證入崇禎甲申衣居士服參訪南來住武林久之住金陵與其賢士大夫游顧性好栖逸古寺飯名僧乙酉年二十九矣始剃髮緇衣蔬食手鈔大藏經盈尺許與金山鐵舟和尚最厚善順治十年癸巳十一月二十八日示化於金陵三山街市中庚子七月所謂賢士大夫者與鐵公醵金錢禮請牛首老禪以慈齊薦之於潮音菴厝於安德門外青龍菴西竹柏間或曰和尚之高祖洎父曾仕正德天崇間世著忠節有聞於時和尚亦以進士起家厯南北部曹至京卿余顧未詳其世次云楓窗小牘載東坡一帖云足疾用葳靈仙牛膝二味為細末蜜丸空心服又云葳靈仙難得真者必味極苦而色紫黑如胡黃連之狀且脆而不韌折之有細塵起向明視之斷處有黑白暈俗謂之鸜鵒眼此方有竒驗凡腫痛拘攣皆可愈久服有走及奔馬之效二物當等分酒及熟水皆可下獨忌茶耳如犯之不復有效當收槐芽皂角芽之極嫩者如造草茶法貯之以代茗飲臺灣物産多異中土按東郡太守孫湘南元衡赤嵌集所録有波羅蜜狀如米頂中分十數房似蓮瓣抱生其色黃其味甘房各一實煮食似栗鳯梨通體成章抱幹而生葉自頂出森若鳯尾其色淡黃香果花有鬚無瓣色白其實中空內如蠟九羡子俗曰番蒜或作檨其種云佛國所傳刺桐花色紅如火號刺桐城番茉莉花千層大如菊鐵樹花狀如竹絲燈籠廣張千瓣瓣各一花蝴蝶花樹曇花葉叢生如帶濶五寸許旁生方筳著花高五尺許花色純紫在法華寺亦西方種午時梅色紅午開子落紅繡毬黃美人蕉迎年菊與秋花無異惟紫色一種開厯冬春石榴花臘月開新婦啼魚名狀本鮮肥熟則拳縮飛籍魚傳是沙燕所化兩翼尚存漁人懸燈以待則結陳飛入舟中鸚哥魚烏喙紅色周身皆緑翠蟹色如翠羽海龍頭鬛如龍形無牙爪冬日雙躍灘上以之入藥功倍海馬産澎湖澳吳天章雯過真定賦詩云鎮州荷花一萬柄正對城門是酒家下馬當壚更斟酌醉臨明鏡看吳娃風格殆不減楊廉夫余與海內論詩五十餘年高才固不乏然得髓者終屬天章也廣州府城西長壽菴離六堂側池上有石一株云産七星巖其色黃如蒸栗瑩潤如蜜蠟琥珀稍有皺紋高可三四尺真竒物也從來太湖石以供園林假山之用靈壁石英德石可作研山懸磬端溪石作研材青田石作印章邇來福州壽山石五色具備而堅細瑩潤不減凍石以開採太酷石脉遂竭土人以芙蓉山石亦福州山名代之以誑鬻者然色與質皆劣價亦頓減矣吾鄉章邱南山巖洞忽出石色正緑如翠羽之可愛長有徑二三尺許者峰巒聳峭坡陀迤邐水道分明置之盆盎信是竒觀不數年以開採過當石脈亦竭今亦不易得矣明詩人多有早慧而年不得四十者如髙季迪何仲默徐昌穀鄭繼之髙子業數公卓爾不可及矣薛君采王舜耕孫太初殷近夫梁公實宗子相次之至陳后岡董中峰常明卿之屬汗血方新而筋骨未就秀而不實殊可惜也門人陳子文奕禧號香泉海寧望族其家簮笏滿牀子文獨以詩歌書法著名當世其書專法晉人於秦漢唐宋以來金石文字收弆尤富皆為題跋辨證米元章黃伯思一流人也後召至大內南書房賜御書甲申出知石阡府戊子補任南安江西巡撫郎中丞重其名求書其先世碑志而子文忽以病卒官妙蹟永絶清詩零落所藏金石文字不知能完好如故否其子世泰以書名世其家必能藏弆不至散佚生平與蒲坂吳天章雯最善今先後下世矣悲夫劉公子節之孔和詩云少陵詩竭情右軍書趂媚譬如今雅琴乃是古鄭衛此語固頗髙何以處衰季多巧傷元化僞古愈堪畏强擬皇娥篇𠞰取岣嶁字不如求真至辛淡皆可味旨哉言乎胡元瑞論歌行自李杜髙岑王李而下頗知留眼宋人然於蘇黃妙處尚未窺見堂奧在嘉隆後可稱具眼康熙己未開明史館其後總裁及纂修官遷轉病假不一屢易其人最後乃增孝感相國熊公青嶽賜履未幾熊以老病乞歸允解閣務令居京師以備顧問久之復求歸田允之遂自進明史若干卷命復內閣參詳其書熊自撰進即同為總裁數公亦不得而見之也內閣參詳覆旨云何余甲申冬歸田無從而知矣燕燕之詩許彥周以為可泣鬼神合本事觀之家國興亡之感傷逝懷舊之情盡在阿堵中黍離麥秀未足喻其悲也宜為萬古送别詩之祖余常謂古今寃獄首漢淮隂次則明傅潁公耳康熙丙子被命祭告西嶽道出井陘有詩云少日紛多慨龍門太史書劫殘秦復趙齒冷耳兼餘詎有無雙士而師李左車到頭鐘室恨功狗竟何如又甲子奉命祭告南海過定逺弔傅公云躍馬千山外呼鷹百戰場平蕪何莽蒼俱上聲雲氣忽飛揚寂寂通侯里沈沈大澤鄉潁川湯沐盡空羡夥頤王蓋陳涉亦産此地故結句云然昔人云秦少恩哉吾於漢明二祖亦云若宋文帝之殺檀道濟北齊高洋之殺斛律光宋高宗之殺嶽忠武明世宗之殺夏言曾銑又各有斷案爰書也曹頌嘉禾祭酒常語余曰杜李韓蘇四家歌行千古絶調然語句時有利鈍先生長句乃句句用意無瑕可攻擬之前人殆無不及余曰惟句句作意此其所以不及前人也四公之詩如萬斛泉源不擇地而出行乎其所不得不行止乎其所不得不止余詩如鑑湖一曲若放翁遺山已下或庶幾耳樂府江陵去揚州三千三百里已行一千三所有二千在愈俚愈妙然讀之未有不失笑者余因憶再使西蜀時北歸次新都夜宿聞諸僕偶語曰今日歸家所餘道路無幾矣當酌酒相賀也一人問所餘幾何答曰已行四十里所餘不過五千九百六十里耳余不覺失笑而復悵然有越鄉之悲此語雖謔乃得樂府之意己丑十一月十八日對雪讀古樂府偶書涇陽李屺瞻念慈汴梁竹枝詞云紅油車子賣蒸羊啓蓋風吹一道香余見之笑曰信陵賓客東京夢華古今來應有多少感慨而顧朵頤紅油車子之蒸羊此正呂頤浩所云措大知甚好惡者耶門人周雪客在浚櫟園先生長子也有汴梁懷古詩云七朝享盡升平福冷雨凄風哭靖康又有孫吳天發神䜟碑歌頗竒偉即所謂囤碑者也在義興國山同年吳侍讀默岩國對在儀真常書許彥周詩話老杜丹青引一洗萬古凡馬空坡公觀吳道子畫壁詩筆所未到氣已吞惟二公之詩各可以當之而舉余少作周文矩莊子說劒圖詩使筆如劒劒氣出之句以為唯余詩足以當之今五十年矣默巖墓有宿草其姪昺辛未㑹試余從落卷中得之拔置第八名廷對鼎甲第二人及第與默巖科名正同戊子以侍讀督湖廣學政卒官亦略與默巖同也東坡謂柳柳州詩在陶彭澤下韋蘇州上此言誤矣余更其語曰韋詩在陶彭澤下柳栁州上余昔在揚州作論詩絶句有云風懷澄淡推韋栁佳句多從五字求解識無聲絃指妙柳州那得並蘇州又常謂陶如佛語韋如菩薩語王右丞如祖師語也宗室玉池生又號紅蘭主人常刻郊島詩名寒瘦集以天潢之貴而嗜好如此亦竒人也又宗室東臯主人者攻詩最久有東臯集今俱下世矣許彥周謂張籍王建樂府宫詞皆傑出所不能追蹤李杜者氣不勝耳余以為非也正坐格不高耳不但李杜盛唐諸詩人所以超出初唐中晚者只是格韻高妙康熙己丑霪雨竟嵗屋漏牀牀偶見曦景則舉酒相賀十一月十八夜始得微雪曉起即晴著屐過石帆亭憶蕭亭方卧病山中賦一詩寄懷云愁霖昧昏旦嵗律俄已窮今晨喜初霽草木開春容一徑入雪竹半嶺聞風松紛吾懷故人卧病西南峰愛而不可見側身欲相從緑蕚破輕素玉茗舒新紅何時散花室敷坐談真空中牟縣南門外有南湖湖中有蒲盧亭余以丙子使秦蜀歸過之惜其名不雅馴以邑名士張林宗民表常飲酒賦詩於此改名墊巾題一詩云南郭孤亭野水濱菰蒲獵獵水鱗鱗林宗未逺風流在不愧亭名是墊巾栁塘外集二卷宋廬山僧無文道璨詩也頗有江西宗法江都張印宣師孔遊開先於佛藏中鈔得之刋以行世問序於余老懶未報姑記於此古人贈答有通篇用事切其人姓氏者雖非詩家所貴亦不易也憶昔毗陵鄒訏士祗謨吳興沈鳯于爾燝有贈余長律及長短句皆通篇用王氏事組織甚工惜不能記憶矣余少時喜作長短句詠楊花云陌上樓前消得香閨幾日憐又云欲問三生絶可憐又化浮萍去輞川本宋之問别業而千古專屬摩詰者以之問之名辱山水也滄浪亭後屬章惇而千古專屬蘇子美者以惇之名辱山水也唐人拗體律詩有二種其一蒼莽厯落中自成音節如老杜城尖徑仄旌斾愁獨立縹眇之飛樓諸篇是也其一單句拗第幾字則偶句亦拗第幾字抑揚抗墜讀之如一片宮商如許渾之溪雲初起日沈閣山雨欲來風滿樓趙嘏之湘潭雲盡暮山出巴蜀雪消春水來是也元初西僧發㑹稽六陵事亘古未聞唐林二義士冬青引諸篇沈痛過於黍離麥秀載於宋遺民録輟耕録者與其人俱不朽矣近偶閲李材解酲語記諸髠發陵所得寶器録之徽宗陵走花鳥玉筆箱又銅涼撥繡管高宗陵珍珠戲馬鞍嶺南劉鋹進太祖者光宗陵交加百齒梳香骨案理宗陵伏虎枕七寶和成伏虎之狀穿雲琴金猫睛為徽龍肝石為軫唐宫故物度宗陵五色藤盤影魚黃瓊扇柄其餘不可盡舉沂水縣有花之寺不解其義張杞園問之土人云以寺門多花卉而徑路窈折如之字形故以為名周侍郎櫟園詩月明蕭寺夢花之其長子在浚有花之詞一卷門人湯西崖右曾仁和人少以詩名書法遒媚似東坡以禮科給事中提督河南學政作誓詞告天甚苦居官三載不名一錢此近日廉吏之尤著者不可沒也在京師日以黔遊詩屬余論定惜東歸匆匆遂失其本與吳雯天章王戩孟穀皆布衣至交也今為右通政余昔為禮部郎時同官吳興沈郎中雲中令式內江嶽員外石齊貞以事鬨於堂諸君解之不可得余後至笑曰僕魯仲連先生鄉人也欲吟一詩為二君解紛可乎因吟曰長鎗大劒日紛紛誰識毛錐亦策勳今日東陽逢瘦沈公然來撼嶽家軍諸君皆一笑而罷偶感韓翃君平事作一絶句云寒食東風散蠟時姓名早被九重知如何白首依戎幕剛遣兒童笑惡詩古琴銘山虛水深萬籟蕭蕭四句新建陳士業述之於寒夜録乃姚寬西溪叢語所載洛中董氏家藏雷琴也王槩字安節金陵人方嵞山文之女夫也工詩畫常見其題山水小幅一絶云湖干路僻無車馬葭菼蒼蒼冷到天長日接䍦慵不著草堂閒對鷺鷥眠看煞二字有兩出處世說看煞衛玠東坡歸自海外在毗陵舟中兩岸聚觀者不下千萬人坡笑語座客曰莫看煞軾否余過梁溪詩云買得蜻蛉小如葉推篷看煞九龍山九龍即惠山也德州羅酒擅名京師清冽在滄酒之上余自甲申歸田謝郎中方山重輝屢致家釀己丑冬雪後先以詩來云黃流初壓室氤氲親貯陶瓶逺寄君非向故人誇酒旨醉鄉風味欲平分余以二詩報謝云白家烏帽重屏裏初試紅泥小火爐恰是陵州酒船到不愁風雪壓廜􅂒酒車冒雪逺衝泥尺素殷勤謝傅題一樹山茶紅破蕊花前催進玉東西長洲文㸃衡山裔孫畫有家法常為鄢陵梁曰緝熙作江村讀書圖汪苕文琬題詩云鄢陵野色平如掌也有江南此景無余見之曰吳子乃爾輕薄耶茗文笑曰子勿多言行且及子乃賦一絶云髣佛春江緑樹隂幾回掩卷幾沈吟江南與汝干何事賦得愁心爾許深以余詩有江花江鳥不相識寫向丹青俱眼明之句云余又題茗文讀書圖云朱門鼎鼎厭粱肉忍饑誦經無此人娜如山中好泉石他年真作孟家鄰娜如即雅宜山也昔在郎署時與劉公㦷汪苕文董玉虬梁曰緝程周量輩無旬不過從倡和吳江計孝亷甫草東亦與焉公㦷自刑部改吏部郎中例應關防一日甫草詣之閽者拒弗為通甫草退而獻詩云隔牆空望馬纓花公㦷寓邸有夜合一株最高大花時常集飲於此故云長安傳以為笑西溪叢語云人參許氏說文作人參扁鵲云有毒或生邯鄲三月生葉小花核黑莖有毛九月採根有頭足形面目如人春秋運斗樞曰搖光星散為人參廢江淮山澤之利搖光不明人參不生禮斗威儀云君乘木而王有人參生廣雅云參地精人參也梁書坑孝緒母需人參舊傳鍾山所出有鹿引之鹿滅得此草異苑與廣五行記皆云地下有呼聲掘之得人參如人形四體備具其聲遂絶入人參譜漢樊噲傳從攻項羽屠煮棗晉灼曰地里志無今清河有煮棗城功臣表有煮棗侯顔師古曰既云攻項羽屠煮棗則其地當在大河之南非清河之城明矣姚寬曰考後漢地里志濟隂郡寃句有煮棗城正大河之南也可以補漢史之闕頃偶徴縣以棗名者有棗强棗陽酸棗煮棗等而未詳其處讀西溪叢語頗詳晰録之韋集向所見諸本皆稱韋蘇州昔奉使公路浦常向門人張弨力臣借書得舊版韋集籖題獨稱韋江州平生僅見此本惜不記其序出何人及鋟刻年月郡邑矣陳子文奕禧初丞安邑夢至一山寺殿廡像設極宏麗顧見西北隅下臨城堞有園圃新作一亭尚未覆瓦傍有人指示曰此君終身歸宿處也後三十年纍官知南安府一日遊東山寺殿廡像設宛如夢中所見方心異之忽顧西北林木缺處下有園圃中作一亭將成尚未覆瓦問之則府署後圃子文重建宋守李彝庚緑隂亭也益異而心惡之歸遂寢疾不起初子文得南安寄余書曰郡圃冇宋人緑隂亭址暇當重葺之退食則吟詩作字於此亭將成而歿竟未得一日居也漢梅福傳人有見之㑹稽者變姓名為吳門市卒或云吳門乃洪州今有鎮名吳門然總非蘇州也宣室有二殷宣室在朝歌淮南子武王破紂殺之於宣室殷宮名也音如宣帝宣王之宣漢未央前殿有溫室宣室音如負暄之暄見集韻名同而音異吾郡李文叔格非閨秀清照之父元祐君子也其集不傳傳者僅洛陽名園記一卷可略見其梗槩此外遺文數篇雜見說部余已録之以存文獻近從楓窗小牘又得元祐六年七月哲宗幸太學宰執侍從呂大防蘇頌韓忠彥蘇轍馮京王巖叟范百祿梁燾劉奉世范純禮孔武仲顧臨等三十六人紀事倡和詩序一碑雅潔是元祐作者風氣文多不録他日或續郡志不可遺此文吕紀梅花雙鶴一幅最高雅己丑歲除題一詩於左方云嫩寒春曉遊人少繫艇孤山籬落間想見西湖林處士妻梅子鶴一生閒紀四明人字廷振與林良先後以花卉翎毛得名二人俱官錦衣衛指揮名見圖繪寶鑑新安畫派多以漸江為宗門人程友聲嗚獨逺宗董巨嘗為余作夫于亭圖及緑楊城郭是揚州之句皆得古人六法三昧己丑六月新安黃研旅又裹糧過訪留余西城别墅信宿瀕行以出塞度嶺二圖索題為賦三絶句云戍樓吹角度榆關回首孤城海氣環下馬戰場須痛飲朔雲飛雪十三山右出塞曾詢衣鉢問南華身到曹溪六祖家今日披圖猶髣佛越王修竹佛桑花荔子初紅江水長鷓鴣啼處到蠻鄉嶺南耆舊凋零盡誰與斑騅送陸郎右度嶺黃在粵中與梁孝亷藥亭佩蘭善時相往還故余詩及之游宦紀聞云白衣為油汚石膏火煅研細搽汚處以重物壓之過夜即如初或新石灰亦佳沈存中云楚詞些字即梵語薩婆訶三字之合也取新蘿蔔自然汁入龍腦少許治偏頭痛竒效左痛則仰灌右鼻孔右痛反是皆痛則並灌之宋禁中方也律詩貴工於發端承接二句尤貴得勢如懶殘履衡嶽之石旋轉而下此非有伯昏無人之氣者不能也如萬壑樹參天千山響杜鵑下即云山中一夜雨樹杪百重泉昔聞洞庭水今上嶽陽樓下云吳楚東南坼乾坤日夜浮古戍落黃葉浩然離故關下云高風漢陽渡初日郢門山錦瑟怨遙夜繞絃風雨哀下云孤燈聞楚角殘月下章臺此皆轉石萬仞手也古來改官制官名者有三皆亂朝也一王莽二周天元三武瞾莽世盡改郡縣名尤無謂唐彥猷詢硯譜以青州黑山紅絲硯為第一且云資質潤美發墨久為水所浸漬即有膏液出焉此石之至靈者非他石可與較故列之於首按黑山在益都西鄉顔神鎮友人趙子和作羮採黑山石琢硯二枚相寄雖發墨而甚損筆且石理粗硬非端溪比也彥猷所云不知何據昔人品果以緑李為第一居荔枝之上亦此類也江神識山谷書扇事世傳以為異又有一事頗類此沈遼睿達存中之姪善書舟過富池吳將軍甘寧廟遇風遙禱於神風止泊岸乃作贊手書之留廟中後為好事者取去郡守夢神告之追獲而還之廟然則興霸亦嗜書也王氏農書吾鄉前輩所撰今傳於世宋時有鄧御夫者字從義隱居不仕作農厯百二十卷較齊民要術尤詳濟守王子韶上之於朝其書不傳濟上人亦無知者僅墨莊漫録載其名字惜哉名勝志太原府城內有巨鐵常露其頂掘之則深入不出曰鐵母今有鑌鐵祠西樵游并州題詩云塊爾留其質蕭然覆古苔氣應干象緯地已絶塵埃知有藏鋒用無勞大冶開風胡今已逺珍重寶刀材閩中紙織畫山水花卉翎毛皆工設色亦佳或言近日始創為之余按留青日札嘉靖中沒入嚴嵩家資有刻絲衲紗紙織等畫之名則其來久矣江淮間近又有漆畫渲染花鳥意態如生人工之巧可謂愈出愈竒矣余兒汸頃遊揚州於門人程聖跂哲齊中見之康熙庚午御史上疏請修本朝國史上命士禎為副總裁然提調所行文移有不可通者如各鹽差關差例行户部轉行各差查取舊案而必言太祖太宗朝檔案云云當時龍飛遼左尚未一統安得有各直省鹽關等差屢為言之終不易也典午人以放誕相尚即女子亦然王渾妻鍾語渾曰使新婦得配參軍生兒當不啻如此參軍渾弟倫也然當時京陵東海禮法並稱鍾郝殊可笑分甘餘話卷三
