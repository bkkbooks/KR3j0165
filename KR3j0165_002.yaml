body:
  text: 分甘餘話卷二刑部尚書王士禎撰真定府臨濟寺唐義元禪師道場余以康熙丙子過之荒凉頽落閴無一僧今臨濟兒孫滿天下名山大剎開堂領衆者不可勝數而祖庭敗壞如此無一人任興復者余因憶宋僧證悟法師題馬祖殿云寄語江西老古錐任教日炙與風吹兒孫不是無料理要見氷消瓦解時遂題是詩於佛殿之壁今又十三年矣不知竟有擔當此事者否也黃始字靜御吳人有詩云一聲啼鳥半江月才到兩山天欲明李文饒牛僧孺君子小人判然也潁濱並稱為豪傑之士而東坡戲為酒令云牛僧孺父子犯罪先斬小畜後斬大畜然則僧孺之人可知矣可與贊皇並稱乎明彭澤王瓊如參商水火之不相能其為邪正亦易見也乃李贄名臣傳列瓊而澤則附見之公議安在余少時評陳卧子子龍湘真詞如香車金犢流連陌阡轉令人思草頭一㸃之樂凡為詩文貴有節制即詞曲亦然正調至秦少游李易安為極致若柳耆卿則靡矣變調至東坡為極致辛稼軒豪於東坡而不免稍過若劉改之則惡道矣學者不可以不辨前輩常云諸佛經多出六朝唐人文士之筆初亦疑之然觀唐貞觀中令𤣥奘法師譯諸經有譯經使十餘人又諭有不穩當處隨即改正則所云多出文士之筆良然漢中府治月臺東南隅有璞石如鼓而方高二尺六寸圍八尺脰間作四獸面有剖露痕審視之真碧玉也門人陳子文奕禧益州于役記云制似罍相傳是楚漢間物未詳秦羅敷敷字或作紂李西臺書小詞亦作羅紂懶真子引漢書昌邑王賀妾名羅紂乃嚴延年女孫然不言敷紂二字何以通用或有博雅者知之俟考歸田録言張僕射飲啖過人晏元獻所食至少近人亦有相類者孟津王文安公鐸在京師諸公欲乞書輒置酒邀之飲無算爵或烹雞卵數十盛以巨盎破餺飥蒸餅亦數十枚雜投其中而食之立盡康熙辛未余二京江相國張公素存玉書典㑹試每五鼓必秉燭起坐夜則和衣而寢食時或切山藥極薄煮熟置盂中不過五七片或炒米少許而已韓慕廬宗伯菼嗜烟草及酒康熙戊午與余同典順天武闈酒杯烟筒不離於手余戲問曰二者乃公熊魚之嗜則知之矣必不得已而去二者何先慕廬俯首思之良久答曰去酒衆為一笑後余考姚旅露書烟草産呂宋本名淡巴菰以告慕廬慕廬時掌翰林院事教習庶吉士乃命其門人輩賦淡巴菰歌故友程石癯南海人嗜檳榔官兵部職方郎中一日早朝余戲占口號贈之云趨朝夜永未渠央聽鼓應平官有底忙行到前門門未啓轎中端坐喫檳榔聞者皆為絶倒按輿轎見前漢書康熙乙丑余奉使南海見六榕寺一立佛像皆以珠玉珊瑚瑪瑙琥珀蜜蠟􅟴璖諸寶莊嚴之已為希有頃聞京師鬻一紫檀坐椅制度精絶亦以珠玉等諸寶為飾一方伯之子欲以百二十金購之德州李庶常文衆柄力止之乃已此真所謂竒技淫巧者也近科鼎甲三人皆至八座者甚少同時者更少惟癸丑狀元韓菼第二人王鴻緒第三人徐秉義同時為八座韓禮部尚書王工部尚書徐吏部侍郎衣冠詫為盛事本朝設科已來所未有也歸田録記首甲三人並登兩府者惟天聖五年一榜此足相匹六朝人謂文為筆齊梁間江左有沈詩任筆之語謂沈約之詩任昉之文也然余觀彥升之詩實勝休文逺甚當時惟𤣥暉足相匹敵耳休文不足道也廣平張蓋字覆輿申鳬盟涵光友也嘗有贈申一絶句云草澤賢豪盡上書奎章閣外即公車我同漁父因衰老獨有涵光是隱居金陵黃周星九烟明末進士也贈長洲尤悔菴云今朝喜得見尤侗皆直呼其名此以古道自處故以古道待其友非知已之深者不能也俗人且以為倨傲無禮矣明鹽山王忠肅公翺官太宰滄州馬恭襄公昂官大司馬忠肅在朝每面呼其名此尤古道之不易行者又非詩文之比有獻古鏡於呂文穆者云可照二百里公曰吾面不過楪子大安用照二百里歐陽公以為得宰相之體吾鄉一先達家居子姓偶言及曹縣五色牡丹之竒請移植之答曰牡丹佳矣然不知能結饅頭否此與呂事相類但其人非耳一鄉先達在明啓禎初不為清議所許常訓子孫勿學為古詩作古詩恐壞人心術或聞之笑曰沈休文始創四聲想當為君子第一但不知何以處陶淵明田元均為三司使厭權貴干請然不欲峻拒每溫言强笑以遣之謂人曰吾為三司使數年强笑多矣直笑得面似靴皮此歸田録所載本非佳語而月泉吟社謝送詩賞劄中有云執事吟髯似㦸笑面如靴引用殊不倫矣傅彤臣扆修軀偉貌鬚眉如㦸博學强記冠絶一時常過一友人家友人有女為狐所祟聞傅至忽語曰傅公正人將來必貴吾去矣果去不復來彤臣辛卯舉鄉試乙未舉㑹試皆與余同年仕至江西道監察御史唐三司使不專領財賦鹽鐵之事凡鞫獄以尚書侍郎與御史中丞大理卿為三司使即明代及本朝之三法司也韓蘄王嶽鄂王皆有背峞軍范石湖云燕中謂酒瓶曰峞其大將酒瓶皆令親隨人負之故號背峞韓嶽取其名以名親軍爾劉麟引衆南侵趙九齡獻策決淮西之水以灌其營麟聞之遂遁去九齡字次張與龍伯可皆竒士陳同父作中興列傳特標出之此事見雲麓漫鈔惜當時不能用也漢明帝時西域僧迦葉摩騰竺法蘭以白馬䭾經至雒陽處之於鴻臚寺故後僧所居皆曰寺元帝被疾求方士漢中送道士王仲都處之於昆明觀故後世道士所居皆曰觀上見雒陽伽藍記及石林燕語下見雲麓漫鈔本朝侍衛皆於冠上帶孔雀翎以目暈之多寡為品之等級武臣提督及總兵官亦有賜者後文臣督撫亦或蒙賜得之者以為榮袍帽初以紫貂為貴康熙以來尤貴𤣥狐非閣臣不得賜尚書亦有蒙賜者厥名元狐而色實蒼白也渭南南氏自大吉逢吉而下衣冠之盛與靈寶之許餘姚之孫相鼎足若吏部尚書企仲禮部尚書師仲國子祭酒居仁工部尚書居益其尤著者余為禮部郎官時與宗伯孫廷鉉鼎甫同舍相得甚歡一日同人宴集余兩人接坐偶談及前明掌故吏部劉公㦷體仁從旁歎曰大家兒固當不同余同年張禮部者河南人面黔而好傅粉澤順治庚子與同年何行人㽔音元英同典廣西鄉試桂林人為之語曰本是箇畫眉張敞倒做了傅粉何郎辛丑春余客秦淮適何歸自粵金陵酒間談此坐客皆為捧腹絶倒趙承旨家宋槧前後漢書王大司寇弇州得之陸水村完家前有松雪小像後有人以千二百金購之新安賈人復售於四明謝氏自跋云此書去我之日殊難為懷李後主去國聽教坊雜曲揮淚對宫娥一段凄涼景色約略相似此書後又歸新鄉張司馬坦公康熙中有人攜至京師索價甚髙真定梁蒼巗大司馬酬以五百金不售攜去後不知歸誰何矣東都事略跋其述歸熙甫湯若士王損仲三家刪宋史始末甚詳云熙甫未有成書止别集有宋史論贊一卷若士閲宋史朱墨塗乙某𫝊宜刪某𫝊宜補某人宜合某𫝊某某宜附某𫝊皆注目録之下州次部居釐然可觀天啓中損仲起廢籍為寺丞常留心宋史時李九如少卿藏宋宰輔編年録及王祕閣稱東都事略三百卷損仲屢欲𫝊寫并思購宋李燾續通鑑長編以蕆此書今損仲草稿及臨川宋史舊本皆在吳興潘昭度家云云余昔在京師所見即臨川手筆所謂朱墨塗乙者是也余曽鈔其目録祥符草稿則不可得而見矣又聞吉水劉狀元晉卿上公車秪攜宋史刪本一部或即臨川本耶慧持東林慧逺之弟也遊峨眉山於樹中入定宋時有人見之以聞於上始言始末問今何往答言欲往陳留又一書云明時復有人見之陳留亦入定樹中似是傅㑹以神其事又宋時或漁於潭得一鴟夷內有一人酣卧初覺問之曰我談紫霄也宋齊邱竊吾書沈吾水底漁者欲出之曰此間甚適不須出也此亦似傅㑹之說學仙佛者故欲神其事耳葉氏習學記言不如黃氏日鈔黃氏日鈔不如弇州先生讀書後嚴滄浪論詩特拈妙悟二字及所云不涉理路不落言詮又鏡中之象水中之月羚羊挂角無跡可尋云云皆發前人未發之祕而常熟馮班詆諆之不遺餘力如周興來俊臣之流文致士大夫鍛鍊周內無所不至不謂風雅中乃有此羅織經也昔胡元瑞作正楊識者非之近吳殳修齡作正錢余在京師亦嘗面規之若馮君雌黃之口又甚於胡吳輩矣此等謬論為害於詩教非小明眼人自當辨之至敢詈滄浪為一竅不通一字不識則尤似醉人罵坐聞之唯掩耳走避而已康熙甲戌余在京師歲除大雪偶邀老友姜西溟吳商志門人蔣京少查夏重宋山言周策銘殷彥來蔣靜山諸子寓齊小集酒酣𨽻事各賦五言詠古一章彥來詩最先成次日又以歲寒吟十五首見投余口占絶句贈之云昨夜草堂風雪裏羣賢擊鉢羡殷生朝來更愛新篇好十五詩當十五城此詩蠶尾集不載今追録於此一時公卿和彥來歲寒詩者凡數十家田綸霞少司徒為授之梓澤州相國作序韓宗伯慕廬作跋亦藝林佳話因牽連記之孟子曰仲尼之徒無道桓文之事者子貢又聖門高弟也吳越春秋越絶書言子貢一出而存魯亂齊亡吳霸越若如所云乃蘇張之前茅耳不惟說壞子貢亦辱聖門矣余生平最愛楓葉行吳楚間所見多矣尤愛雪中楓桕淺深相間有如畫圖己丑九月下浣六日未霜而有微雪大兒洓以石帆亭楓葉十餘片至微紅可愛輒從枕上賦一詩云秋雨連宵響菊叢石帆亭畔小池東正衙無夢頒新厯六見池邊楓葉紅時去十月朔頒厯才四日順治辛丑春雨中泊舟楓橋寄先兄西樵二絶句云日暮東塘正落潮孤篷泊處雨瀟瀟踈鐘夜火寒山寺又過吳楓第幾橋楓葉蕭條水驛空離居千里悵難同十年舊約江南夢獨聽寒山半夜鐘今荏苒五十年矣西樵下世亦已三十餘年回思往事為之憮然而歎今新進士賜宴謂之瓊林宴瓊林宋京城四御苑之一石林燕語瓊林苑金明池每二月命士庶縱觀謂之開池歲賜二府從官宴於此進士聞喜宴亦在焉自明代相㳂至今猶唐之題名雁塔也宋仁宗嘗問宰執修唐書時何不專命歐陽修又諭舊唐書不可廢真聖人也明世宗時議大禮與宋英宗時濮議事體稍異蓋仁宗養英宗於宮中立為皇子已久名分久定於禮毫無可疑故溫公之疏曰今上為仁宗子而稱濮王為皇考則置仁宗於何地此萬古不易之論也世宗未為孝宗之子又承武宗之後故稍有不同張孚敬桂蕚因得乘間抵隙逢迎以售其說而躐取大位然楊文忠以下凡得罪者其心不忍負孝宗皆君子也張桂方獻夫霍韜之徒僥幸干進志在逢迎皆小人也曩史館開局時諸人尚有紛紜之論林下退閒偶讀歐陽司馬二公集聊復論之若歐陽公賢者而其議濮事則亦敢於負仁宗者吾終不敢以為是也昔亡友葉文敏評余蜀道集詩毋論大篇短章每首具有二十分力量所謂師子搏象兔皆用全力者也余深愧其言文敏又嘗語余兄七言長句他人不能及祗是熟得史記漢書耳讀書萬卷下筆有神余雖不敢當文敏則知言矣門人殷彥來寄其亡友夏生任逺遺詩僅一卷中有和余秋栁詩四首頗可誦其秋夜讀九歌云湘皇淚雨滋叢竹山鬼悲風帶女蘿春寒云梨花落地半窗雨栁絮入簾三日風皆晚唐佳句彥來傷其不遇早夭為序而傳之友道亦可風也夏即余門人九敘從子其妹亦能詩忠武侯討魏通鑑以寇書千古公憤故元人楊奐詩曰欲起溫公問書法武侯入冦冦誰家余讀通鑑至後唐莊宗欲討僞梁亦以謀入冦書不禁髮指亦題一詩曰一代清流盡喪亡紇干山雀可憐傷溫公書法憑誰問又說河東欲寇梁如來㑹中阿那律多無目而見跋難陀龍無耳而聽殑伽神女非鼻聞香驕梵鉢提異舌知味舜若多神無身覺觸今吾年逾七十有耳而不能聽有目而不能見是見聞二根先去雖欲讀書娛老而亦不能矣古人云聰明智慧殊不再來為之三歎世祖皇帝順治中各省布政使內升有徑升侍郎者或通政使大理卿宗人府府丞康熙中重定品級考布政使外升巡撫副都御史內升則太常卿順天府尹間亦遷光祿太僕正卿己丑特命廷臣薦舉翰林藩臬可任京卿者以江西布政使孟世泰為鴻臚寺卿廣西布政使李濤為太常寺少卿江南布政使李法祖為順天府府丞舊制按察使內升則大理寺少卿左右通政是外之三品升內之大四品也布政使升常少鴻臚府丞則以外之二品升內之小四品也又與常例不同余門人廣陵宗梅岑名元鼎居東原其詩本才調集風華婉媚自成一家常題吳江顧樵小畫寄余京師云青山野寺紅楓樹黃草人家白酒篘日莫江南堪畫處數聲漁笛起汀洲余賦絶句報之云東原佳句紅楓樹付與丹青顧愷之把玩居然成兩絶詩中有畫畫中詩顧字樵水亦名士余在九卿時薦舉人才甚多率不令其人知之故時有冒竊居功者聞之一笑而已如孟世泰李濤鞠宸咨莊搢衛台瑺劉元勳之屬蓋不下十餘人至今屢被遷擢尚有不知者宋蘇魏公云平生薦舉不知幾何人惟孟安序朝奉歲以雙井茶一瓮相餉古今一也要視其出於公出於私爾聞往昔薦一人有酬謝不訾者吾郡楊太宰夢山先生巍五言沖古淡泊在高子業華子潜季孟間如逺道令人愁况近單于壘秋風入鴈門羽書日三至微微霽景流天壤色俱素鄉心生塞草世事入秋風風雨樓煩國關山李牧祠閒將流水引夢與古人居雨響殘秋地城分不夜天石古苔生遍泉香麝過餘皆逼古作余平生交友不敢自居於薄在京師遇施愚山沈繹堂李容齊葉訒菴數公之喪哭必盡哀今人雖至交指天日盟肺腑及勢分相埒聲名相亞遂忘夙好而反下石者有之矣可歎也古德云水鳥樹林皆為說法又云狗子具佛性此非虛語近耳目聞見如京師某寺之蜘蛛塔安陸之念佛鳥靖州之聽經鵝皆昭灼在人耳目者新城北郭真武廟老道士趙雲山戒行清苦每誦經輒有一蛇跧伏其旁久益馴擾雲山歿蛇亦去不見以是推之露柱瓦礫皆可知也康熙丙子余再以祭告使蜀歸次朝天關土人云某寺有一豕每聞僧徒誦經輒隨其後禮拜誦畢即卧佛座之下性好潔欲溲溺則出往山間皆有常度過者必往看之今尚在明大梁周藩有一虎衛宫門長齊不噬雖投以豚蹄亦不食也先大父尚書公官汴臬時親見之蜀中瓦屋山有貔貅不食人及牛犬之屬惟食虎豹口常誦阿彌陀佛山中僧徒以為法護宋南渡後高宗最重蘇黃詩文筆墨求其子孫官之徐俯師川亦以山谷之甥馴至通顯其詩本江西派也貴後或以書賀之稍及山谷淵源師川答云涪翁之妙天下君其問諸水濱噫安得此負心之語治腋氣熱蒸餅一枚擘作兩片糝蜜陀僧一錢許急挾之腋下少睡片時俟冷棄之北齊竇泰母期而不産有媪教之曰渡河湔裙生子必易從之生泰胡文恭宿詩猶餘仙媪湔裙水幾見星妃度襪塵立秋日日未出採楸葉熬膏傅瘡瘍立愈皮硝入雞腹中煮食消痞以上方見說楛瓻瓵盛酒器也大者一石小者五斗亦作鴟夷紀侯臺在今壽光縣南三十里春秋紀國也耕者常於臺下得一玉磑宋太平興國中鄭州修東嶽廟於地中得玉杵臼皆不知何所用之余作浯溪考成又得唐蔡京鄭谷宋釋惠洪數詩録為補遺適見清波雜志一條姑録於此云浯溪中興頌碑自唐至今題詠實繁零陵近雖刋行止薈萃已入石者未暇廣搜博訪也趙明誠待制妻易安李氏常和張文潛二長句以婦人而厠衆作非深有思致者能之乎李易安詩二篇曩從陳士業宏緒寒夜録鈔出已入集中忘其出處本周輝也諸說皆言王介甫與宋次道同為三司判官時次道出其家藏唐詩百餘編俾介甫選其佳者介甫使吏鈔録吏倦於書寫每遇長篇輒削去今所傳本乃羣牧吏所刪也余觀新刋百家詩選又不盡然如刪長篇則王建一人入選者凡三卷樂府長篇悉載何未刋削王右丞韋蘇州十數大家何以絶句亦不存一字余謂介甫一生好惡拂人之性是選亦然庶幾持平之論爾順治末社事甚盛京師衣冠人士輻輳之地往來投刺無不稱社盟者後楊給事自西雍建疏言之部議有禁遂止不行二十年來京師通謁無不用年家眷三字即醫卜星相亦然有無名子戲為口號曰也不論醫官道官也不論兩廣四川但通名一槩年家眷亦可一笑也余所見不隨俗者惟龔尚書芝麓鼎孶勞中丞介巖之辨二公而已康熙甲辰先兄西樵以中州科場磨勘事自吏部移法司㑹中秋合肥龔端毅之門生為置酒呼梨園部奏伎公愀然曰王西樵無妄在請室吾輩可樂飲乎遂罷遣樂人茗粥清談而已古道久廢特書此以勵薄俗益都孫文定公廷銓為諸生時數有異徴一日天未明自家赴孰過大街西關街名見一人負簷而立長過於簷無他徑趨避其怪忽直前捽之文定急奔溪西鳯山玉皇宮怪物亦涉水隨至文定方皇遽無計忽自覺身驟長與之相等乃手搏之怪物錯愕逃去又嘗讀書家孰有狐夜遺金豆十餘枚後既貴人稱金豆孫家公順治中厯官吏户兵三部尚書康熙元年拜相或貽古鏡一視之乃先太師公故物也背有公自製贊云爾雅曰鑒謂之鏡釋名曰鏡景也言有光景也古之人目短於自見取諸鏡以觀其面夫鏡不設形而能有形故人舉其醜則怨鏡見其醜則善南華經云至人之用心若鏡不將不逆應而不藏故能勝物而無傷吁可以鏡矣讚曰瑩兮玉光兮珠其用常明其中常虛左有文曰萬厯甲申年造上為乾卦有小印為象形公名也右一小印曰桓臺王子廓公字也公故物惟此鏡與端溪小研一光潔如白玉亦有刻字曰王子廓家珍藏端研無銘秦淮青溪上有張麗華小祠不知何代所建余賦詩二首紀之以存古蹟云璧月依然瓊樹枯玉容猶似憶黃奴過江青蓋無消息寂寞青溪伴小姑臨春樓閣已銷沈遺廟荒凉碧蘚侵惟有青溪嗚咽水至今猶自怨韓擒唐修隋史謂韓擒虎曰韓擒避廟諱也蜀劍州西郭有小廟祀鄧艾余賦絶句示州人云申屠曾毁曹瞞廟常侍還焚董卓祠劒閣至今思伯約蜀巫翻賽棘陽兒明時有官隂平者立一碑於道左大書曰鄧艾入蜀路見者笑之碎其石今之立廟得無類是耶若干二字出古禮鄉射大射數射算云若干純若干竒若如也干求也言事不定當如此求之又曲禮問天子之年始服衣若干尺矣漢食貨志顔注云設數之名也亦曰如干又復姓後周有若干鳯及右將軍若干惠若音人者反釋名云以國為姓右癸辛雜識所引極詳輒因或問而備録之岑詩山風吹空林颯颯如有人黃庶詩山精水怪衣薜荔天祿辟邪眠莓苔余游廬山亦得句云薜荔衣怪樹山風恐行人各寫一時所見而句法相似然岑亦本古詩羅帷卷舒似有人開意非創也古人著述詩文一生心力所寄必有所託以思傳於後世如白樂天寫集三本一付廬山東林寺一付蘇州南禪一付龍門香山寺陸魯望詩文手稿盡置白蓮寺佛像腹中唐求詩草置大瓢中投諸岷江之流皆名心未忘故也如來自言四十九年未曾說著一字乃亦以身後結集屬大迦葉豈名心亦未盡忘耶頃襄城劉太乙青藜翰林書來云欲自作八分書余漁洋蠶尾諸集詩藏於少林代余謀所託意良厚因述此以報之水仙之名甚美馮夷為河伯名曰水仙伯牙從成連之海上作水仙操西湖有水仙王祠陶峴泛三舟於江湖吳越間號為水仙他如雒妃湘君之屬皆水仙也乃盜賊如孫恩流毒㑹稽吳興數郡及勢窮投海死其黨亦稱為水仙甚可笑也脫清都仙籍果有此輩正當與趙高李林甫同班爾治喉閉急症用鴨嘴膽礬研極細以釅醋調灌吐出膠痰立愈癸辛雜識云帳帶散用白礬不甚效癸辛雜識又云熊膽少許用淨水略潤開盡去筋膜塵土入氷腦一二片如淚癢則加生薑粉些少以銀筯㸃眼能去障翳及赤眼最效同年汪鈍翁小字液仙程石臞小字佛壯劉公㦷每自稱阿㦷余在揚州日常有詩寄西樵兄及三君云佛壯談詩登祕閣液仙趨府算錢刀還思阿㦷歸清潁仕隱無端愧汝曹天寧佛火共淹留千里驚逢落雁秋何處憑䦨望西北暮雲明月滿蕭樓詩載漁洋前集坡公作攓雲篇余昔行秦棧中見道左石罅間烟氣如縷頃刻瀰漫山谷已而雨大至行人衣袖中皆雲也始信囊雲非妄工部郎官有街道㕔一差出則二黑鞭前引而一𨽻肩獨板在馬後汪郎中璽以啓賀其僚友某云雙鞭前導宛兩股之蝦鬚獨板後隨如一條之狗尾聞者無不大笑汪字樊桐仁和人作肅松録左良玉自武昌稱兵東下破九江安慶諸屬邑殺掠甚於流賊東林諸公快其以討馬阮為名而并諱其作賊左幕下有柳敬亭蘇崑生者一善說評話一善度曲良玉死二人流寓江南一二名卿遺老左袒良玉者賦詩張之且為作傳余曾識栁於金陵試其技與市井之輩無異而所至逢迎恐後預為設几焚香瀹岕片置壺一杯一比至徑踞右席說評話才一段而止人亦不復强之也愛及屋上之烏憎及儲胥噫亦愚矣余小時見寶應吳敏道詩一卷頗有佳句僅記其一絶云揚子江頭雨雙橈倚緑蕪愁心將客夢日夜向東吳惜不憶其全矣胡元瑞論明人歌行極尊空同而略於大復不知何聽琴獵圖送徐少參津市打魚諸篇深得少陵之髓特以秀色掩之耳胡専舉明月帝京陋矣蜀八十老僧果菴詩軒窗無暑覺雲起竹樹有聲知雨來分甘餘話卷二
