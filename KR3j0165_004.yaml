body:
  text: 分甘餘話卷四刑部尚書王士禎撰余門人朱書字緑宿松人攻苦力學獨為古文癸未登第改翰林庶吉士未授職卒常為余作御書堂記二篇録之以存其人今文士中不易得也御書帶經堂記古書契未立天地民物之常理燦然上下間伏羲神農黃帝堯舜禹湯文武備之於身以成理萬物無經之名而莫非經也至孔子不得位刪詩書定禮樂贊周易修春秋而後世奉之為六經蓋措之於身則其事精而天下法之以為治筆之於書則其義詳而萬世繇之以為學其道一而已矣新城王公為御史大夫時御書帶經堂額大字頒賜朝士榮之公侈君賜既揭於所居之堂而命書記之帶經之説昉於漢御史大夫兒寬少貧常帶經而鉏公生華胄弱冠掇高科厯顯仕四十餘年矣知遇之隆近古未有與夫憔悴賤貧之士雜身都養賃作間勤不廢經者相去甚逺寬雖能使酷吏如張湯知鄉學雄才大略如漢武與語經學而恱其得力於經有大過人者公文章衣被天下因公而知嚮學者皆是也佐佑文治不但悅所語而欲使天下振興經教以祛邪慝又未嘗不存於心求見諸行事然則公之於經固將與天下法之由之而何帶之與有於乎經之荒亦已久矣以寬生平力學不過採儒術文封禪邀明堂一觴而止經之用顧若是與孔子之聖攝相三月齗齗焉不能使魯為東周僅與其徒退而講遺經於洙泗之濱傳之其人而已於寬又何責焉方寬之為御史大夫也委曲遷就以從人主之好位盛貴極儻回思耰鉏之餘豈不曰吾今者御史大夫之尊殆不若鄉者都養賃作得以優遊一卷之書之為樂哉公以天下萬世所繫賴之身受六經之托著書滿家望風求教於門下者不可數計名斯堂也其將禮耕義種與天下治人情之田乎抑良農能稼而不能穡藏之名山待其人乎朱子之詩曰面似凍梨頭似雪後生誰與屬遺經公其念經之久荒而與吾徒鉏治之則當何如也書固荷鋤之田夫也幸得從公遊故記公堂而卒以鋤田之説進本朝凡視朝駕未出則內閣大學士學士翰林起居注官都察院左都御史副僉都御史先入候駕駕出先於保和殿升座內閣都察院起居注官行禮畢先自御路趨往太和殿內閣立殿門外東西向都察院立殿門外西東向然後駕至升座諸王分東西班魚貫而入敷茵於地而坐起居注班諸王後東向其諸王謝恩則拜於臺階之上畢然後尚書以下文武官員謝恩行三跪九叩頭禮畢然後外國陪臣行禮亦如之近歲遭逢之竒無如毗陵趙中丞申喬者申喬康熙庚戌進士初任為商丘令升刑部員外郎引疾家居特旨起擢浙江布政使尋巡撫其地弟申季丁丑進士自廣西知縣召入翰林子鳯詔戊辰進士知臨汾縣甫一載超擢太原知府熊詔己丑進士特賜狀元及第宋開府牧仲犖遭遇亦竒牧仲以江寧巡撫副都御史超拜吏部尚書子至癸未進士入翰林為編修至福建僉事未一載擢按察使筠己丑進士入翰林為庶吉士余為御史大夫時漢軍御史郭金城上疏請裁冗員下九卿議遂有欲裁御史數員者余毅然爭之曰國初設都察院御史至六十員後減至四十員及停止巡按之差所存僅二十四員每至巡城監禮侍班等差往往乏人余方欲題增數員豈可反議裁乎都察院非冗散衙門御史非冗散之官斷不可裁如有異同之論余必上疏力爭之衆皆以余言為然事乃已陳説岩相國廷敬説其鄉有兄弟皆為名卿而其孫愚騃不知書家以中落至持銀碗乞食於市而不悟銀可易米人家子弟不讀書者可以為戒因書示子孫輩云徐昌穀少年詩所稱警句如文章江左家家玉煙月揚州樹樹花與唐子畏杜曲梨花杯上雪灞陵芳草夢中煙伯仲之間耳較之自定迪功集不啻霄壤微空同師資之功不能超凡入聖如此新安羅醫治痔方用稀熬燒酒七斤南荆芥穗四兩槐豆五錢搗爛煎沸五次空心任意服甚效吾縣前輩鄭簡菴獨復先生明萬厯間舉人仕為山西僉事常著新城舊事一書其自序曰舊事逸史也考古以舊事名者秦漢以來舊事十卷漢魏吳蜀舊事八卷晉宋舊事一百三十五卷晉東宮舊事十卷天正舊事三卷梁舊事三十卷前輩之留心舊事若此南燕主登營丘問晏謨以齊之山川丘陵謨厯對詳辨畫地成圖則雲山煙樹都堪記憶也王武子孫子荆各言其地人物之美王云其人廉且貞孫云其人磊砢而英多則文人才士首應撰述也漢太上作新豐并移舊社士女老幼相攜路首各知其室放雞犬於通途亦競識其家則鄉亭宫館盡入描摹也沛公過沛置酒悉召父老諸母故人道舊故為笑樂則酒瓢羮碗可供談謔也郭璞注爾雅陸佃作埤雅釋魚釋鳥讀之令人作濠濮間想覺鳥獸禽魚自來親人也余竊仿此意編纂兩年為新城舊事若干卷風土人物大略具此矣邑幅員小故實鮮而文獻甲於六郡肇吾邑者為張元帥貴字國寶當金季豪傑並起貴保聚驛臺以至建縣迄今鬱為名邑則元帥固邑之開山主而記所謂能扞大患有功於民元帥其人也元帥祖塋在邑巽隅以施地建學遷塋于家堤今墓表傾埋余洗而讀之乃知元帥兄榮字國昌與濟南張榮字世輝自是兩人保濟南者為元帥榮保新城者為元帥貴貴兄榮以山東行省參議棄官歸隱立父忠墓表劉贊之文甚晰若誤為一人則國寶之功湮矣此創邑有功之先賢余故特書之或病邑建在元不妨逺引以示博雅余曰不然邑名自近地自古戲馬則周臺也安平則漢縣也系水見於水經曾照秦時之明月乾時書於麟筆兒孫漢代之關河又何借為况一時之文獻甲六郡知異日之古迹甲千秋也則編新城異時之舊事應有一百三十五卷時乎唐張繼楓橋夜泊詩前人以夜半鐘聲為疑老學菴筆記引皇甫冉半夜隔山鐘于鄴詩逺鐘來半夜以為唐時僧寺或有半夜鐘不必姑蘇也墨莊云今平江城中自承天寺後改能仁寺半夜鳴鐘諸寺乃以次而鳴逮今如此蓋自唐而然據此則夜半鐘是姑蘇故事務觀亦未之考也妬婦津在臨濟相傳武后不敢渡别取道以避之先兄西樵有詩云解使金輪開道避斯人何減駱賓王妬婦之神劉伯玉妻也陸放翁記大名龍興寺佛殿有魏宫玉石彈棊局上有黃初刻字宣和取入禁中海鹽胡震亨孝轅輯唐詩統籖自甲迄癸凡千餘卷卷帙浩汗久未版行余僅見其癸籖一部耳康熙四十四年上命購全唐詩令織造府兼理兩淮鹽課通政使曹寅鳩工刻於廣陵胡氏遺書亦在採訪之列然此書版藏內府人間無從而見之也崑山徐氏所刻經解多祕本倣佛宋槧本卷帙亦多聞其版亦收貯內府門人殷彥來譽慶書至云劉原父貢父公是公非集吳下藏書家有之許借鈔録又新安族人攜一書目有漢上題襟集蘇叔黨斜川集客臘轉售吳興賈人今績溪胡氏寧國許氏尚有藏本當多方購覔傳寫余夢寐以之聊記其語以俟他日機緣若何耳或問不著一字盡得風流之説答曰太白詩牛渚西江夜青天無片雲登高望秋月空憶謝將軍余亦能高詠斯人不可聞明朝挂帆去楓葉落紛紛襄陽詩挂席幾千里名山都未逢泊舟潯陽郭始見香爐峰常讀逺公傳永懷塵外蹤東林不可見日暮空聞鐘詩至此色相俱空政如羚羊挂角無迹可求畫家所謂逸品是也慈溪薑編修西溟宸英文章豪邁有竒氣本朝古文一作手也其論文自唐虞三代以來盛於六經衰於左氏而再盛於戰國蓋以左氏多迂濶不似國策之縱橫持論太高故世多河漢其言西溟先以諸生入史局分修明史刑法志極言廷杖詔獄東厰緹騎之害淋漓痛切不減司馬子長後以科場事連染竟病卒於請室余時為刑部尚書惟太息而已門人程聖跂哲喜藏書嘗求齋額於余名之曰七略又聞其善鑒别古今圖畫尊彞之屬所蓄甚富築樓三楹居之焚香簾閣精潔不減清閟可謂風雅好事者也芝有五色然紫多吉祥白多反是先曾祖大司徒公第萬厯中梁上生紫芝其年先祖方伯贈大司寇公登第康熙甲申余所居里第東堂老桐朽竅中忽生芝色白余聞而心惡之是冬罷官歸未幾有兒婦之喪又正樓棟橈傾圯壓死者主婢凡四人始驗其為真不祥云鄒平縣鄉語諱畢吾邑畢藎臣字致吾明季名醫也外祖孫氏家常有危疾或言非畢不可諸舅惡其姓終不肯延致之咸笑其迂拘然唐杜牧之夢改名畢而卒宋鄒忠公浩夢道君賜筆而亦卒則古已有此忌矣特以姓為疑則誠迂耳張杞園貞居杞城别墅作杞紀十八卷自星土輿地山川人物而外有封建年表世次原故分國系家苗裔春秋經傳經傳别解引書幾二百種余讀一過曰異哉可謂體大而思精矣或曰范曄集謝承華嶠袁山松司馬彪諸家之作為後漢書自謂體大思精人或未之許也今所紀杞廢國一隅而揚詡之如此不亦過乎余曰不然杞宋無徴昔已歎之今立乎二千年之下以指乎成周春秋之世且自今杞而溯之東樓西樓始封之杞又溯淳于溯州溯斟鄩以旁逮夫羿浞之篡夏后之臣靡滅有窮立少康而夏后氏之興亡備見於是可補太史公帝相杼以下之闕文按之則皆在杞城百里封域之內可不謂體大而思精乎或乃謝曰微先生言幾以杞紀為志乘之流今而後知其良史才也余曰然廣州有妖僧大汕者字石濂自言江南人或云池州或云蘇州亦不知其果籍何郡其出身甚微賤或云曾為府縣門役性狡黠善丹青疉山石構精舍皆有巧思剪髮為頭陀自稱覺浪大師衣鉢弟子遊方嶺南居城西長壽菴而日伺候諸當事貴人之門嘗畫素女祕戲圖狀以媚諸貴人益昵近之於是無所忌憚官粵東者落其圈繢十人而九余甲子奉使至粵聞而心惡之後聞其私販往安南致犀象珠玉珊瑚珍寶之屬直且巨萬連舶以歸地方官亦無誰何之者今河南布政使遷福建巡撫許中丞嗣興為按察使獨惡之輒逮治詰其前後姦狀押發江南原籍死於道路粵人快之余不識許中丞即此一事真頽波中砥柱也聞其居官亦甚廉正觀此事非飲貪泉而不易心者固不能也國初有一僧金姓自京師來青之諸城自云是旗人金中丞之族公然與冠蓋交往諸城九仙山古剎常住腴田數千畝據而有之益置膏腴起甲第徒衆數百人或居寺中或以自隨居别墅鮮衣怒馬歌兒舞女雖豪家仕族不及也有金舉人者自吳中來父事之願為之子此僧以勢利橫閭里者幾三十年乃死中分其資産半豫僧徒半豫假子有往弔者舉人斬衰稽顙如俗家禮余為祭酒日舉人方肄業太學亦能文之士而甘為妖髠假子忘其本生大可怪也因書廣州大汕事而并記之康熙四十九年二月提督四譯館太常寺少卿員缺特旨以部主事李敏啓升補故大學士高陽文勤公霨孫也上之篤念故舊如此康熙四十六年濟南屬邑大旱巡撫檄濟東道僉事宋君澄溪廣業臨縣賑飢使各邑紳士造佃户册按其名領倉米衆皆具册余獨不具册不領米宋使邑令賫手札敦勸且云朝廷之恩不可虛也余答曰某不敏舊嘗備位大臣頃四十三年山東飢奉旨官員各自養佃户今雖居田里敢忘前旨再三力辭不領一粒宋歸述於中丞皆以為得大臣之體稱其廉正然余以義利之辨不得不然其實瓶無儲粟鄉人皆知之宜都內人諌武瞾之言曰今之弄臣狎人朝夕進御夫男陽也女隂也陽尊而隂卑今狎弄日至處大家夫宫尊位其勢陰求陽也陽盛隂微不可久也大家能屏去男妾獨立天下如是過萬萬歲男子益削女子益專右一段文字大義而以詼諧出之有古人譎諫之風東方曼倩不能過也所謂責難於君者與王稚欽目空一世而能推重何仲默愛薛君采鄭繼之古人作青白眼故當如是今人不知視夢澤何如而妄詆前輩一錢不直少陵云爾曹身與名俱滅不廢江河萬古流昌黎云李杜文章在光焰萬丈長不知羣兒愚那用故謗傷蚍蝣撼大樹可笑不自量諒哉米元章研山以南唐寶石為之後歸禾中朱文恪家余常從文恪曾孫彞尊見之真竒物也高濂云曾見宋人靈壁石研山峰頭如黃子久皴法中有水池深寸許其下山腳坐水色白若波濤狀余舊蓄一研山長可五六寸高半之自峰頂至山麓皴法天然而岩巒秀絶己丑夏為大力者負之而趨每一憶之輒作米老蟾蜍淚滴之歎胡應麟病蘇黃古詩不為十九首建安體是欲紲天馬之足作轅下駒也千家注杜如五臣注選須溪評杜如郭象注莊此髙識定論或訾之余所未解咏物詩最難超脫超脫而復精切則尤難也宋人咏猩毛筆云生前幾兩屐身後五車書超脫而精切一字不可移易汪鈍翁過石塢詩云主賓無語似相忘淨掃青苔坐夕陽乳燕飛飛蛙閣閣楚萍謝絮滿池塘鄧漢儀字孝威泰州人常同合肥龔端毅鼎孶使粵過梅嶺有句云人馬盤空細煙嵐返照濃寫景逼真尤似秦蜀間棧道景物梅嶺差卑未足當此寧都魏禧叔子以古文名世余觀其地獄論上中下三篇殊非儒者之言宣城吳肅公晴巖街南集文品似出其右而知之者尚少史能仁字嚴居河南鹿邑人舉人明末崇禎己卯庚辰間為濟南新城令慈以惠民嚴以弭盜敬禮紳士彈壓吏胥懸魚捕蝗善政不可更僕庚辰大飢百姓逃亡而田野間遍生羊肚菜甘美可食四鄉又有甘露之祥公賦詩示士民云上天降甘露滿地生羊肚飢餐羊肚菜渴飲甘露乳涕淚告吾民慎勿去鄉土以調繁改知淄川縣未久內擢兵部主事以去鼎革後再來新城百姓秉炬迎之二十餘里不絶迄今七十餘年未入名宦乃一大缺陷事右一詩朱竹垞選入明詩綜門人程友聲鳴畫既超詣詩亦清令可喜近為余寫夫于亭二圖題句皆佳竹垞曾集成語贈之云吐詞合風騷愛畫入骨髓又每稱其詩為畫所掩良然徐東癡隱君居系水之東高尚其志李容菴念慈為新城令最敬禮之與相唱和李罷官僑居厯下繼之者東光馬某亦知東癡之名然每有詩文之役輒發硃票差𨽻屬其結撰稍遲則籖捉元差限比𨽻畏撲責督迫良苦東癡亦無計避之時傅彤臣侍御里居數以為言馬唯唯然終不悛也容菴知之乃遣人迎往厯下及馬罷官始歸馬作令亦平易近人情獨於東癡一事殊不可解山谷云士大夫惟俗不可醫馬令正坐一俗耳使胸中有數卷書定不至此也廣羣芳譜所載異花凡一百一十六種今略録數十種於左萬年花金蓮茈碧九花樹金䔲花紅綬花優鉢曇迎輦花金步搖靈壽花無憂花那伽花提羅迦拘尼陀繫白象樹花簇蝶花俱郍衛石蓮洛如花太平瑞勝花七寶花娑羅花鵝毛玉鳯花蟬花石蟬花錦帶花青囊花上元紅泡花枸那花水西花象蹄花白鶴花金莖花白菱花閩山丹金鉢盂繅絲花笑靨花紅麥花龍女花會城娑羅花優曇花金縷梅瓔珞花紫雲花海罽花仙都花四照花覆杯花查葡花山叉花鵝羣花海瓊花寶網花長樂花優鉢羅花燕蓊花玉燭花杏香花萬蝶花鷹爪花闍提花御帶花玉手爐花繭漆花散水花孩兒花練春紅長十八波羅花疉羅花藍雀花翠娥眉夏峰孫先生謂滏水老人曰神廟時南臯景逸少墟三先生講學京師首輔葉臺山為之主此治平之機也而三先生相戒不言朝政竟無補於治若學為無用之物矣滏水曰三公不言朝政專言節義異巳者鉏不用於是不節不義者忌矣未幾臺山求去諸君子留之臺山曰內外風波齊起君等不平心而處我在此何幹因憶趙儕鶴先生為冡宰高陽孫相國曾云朝廷官職天下人皆有分我輩必不與異巳者共之此危道也魏璫之禍遂烈於此右見遊譜中余謂三先生相戒不言朝政正所以防小人之忌使言朝政則書院之毁不待逆璫時矣至孫文正公之言即范忠宣公調停元祐熙寧之説然君子小人勢不並立小人常密君子常疏小人得志不盡逐善類不已古今來小人常居必勝之勢漢唐宋以來已事昭然可為龜鏡也然則即以官職與小人共之彼能終為忘機之海鷗否乎越絶書云壁忘鼠鼠不忘壁誠哉是言因讀遊譜有感遂書吳嘉紀字野人家泰州之安豐鹽場地濱海無交遊而獨喜為詩其詩孤冷亦自成一家其友某家江都往來海上因見其詩稱之於詩壇宗匠友招之來廣陵遂與四方之士交遊唱和漸失本色余笑謂人曰一箇氷冷底吳野人被君輩弄做火熱可惜然其詩亦漸落不終其為魏野楊朴始信余前言非盡戲論也小説言明州有人泛海遇風泊一島見宫殿巍煥如王公之居堂上一老人據榻而坐有烏巾者二三百人侍側問之曰唐相裴休也北夢瑣言裴相國休師圭峰密禪師自願世世為國王宏護佛法後于闐王生一子手文有裴休二字聞於中朝然則裴所證仙耶佛耶抑皆小説傅會耶唐詩人李頻為建州刺史傳其歿而為神邦人祀之有梨嶽集行於世然北夢瑣言載頻遺棄糟粳别婚士族內行如此何以為神此與宋劉公漫塘以道學正人而傳為瘟神者同一不經也偶讀宣和遺事作二絶句云宣仁鸞馭上青冥社飯明年一涕零欲問宫中天水碧都人惟説太師青平陽行酒著青衣雨雪青城更可悲汴上已亡金等子臨安空賞玉孩兒宋時禁中有金等子玉等子玉孩兒事詳西湖志餘天水碧藝祖受命之讖太師則蔡京也婁江十子虹友王攄才尤高余嘗序其金陵集鶴尹詩才不及而獨工金元詞曲所為籌邊樓浩氣吟等傳竒不但引商刻羽雜以流徴殆可謂詞曲之董狐唐時有一書生頗通經史而不諳近事乃以駱賓王為諸王封號見因話録然則杜拾遺伍子胥又何怪耶唐以門下省為東臺中書省為西臺尚書省為文昌臺而以御史臺為南臺故今都察院可稱南臺不可稱西臺惟唐人稱李栖筠為李西臺宋人稱李建中為李西臺按建中以分司西京猶近理栖筠官御史大夫而呼西臺則不可解矣余康熙庚午為副都御史常集唐六典諸書作南臺故事一書未幾遷兵部侍郎遂不果成己卯為左都御史欲卒業此書亦因循未果也金陵牛首山寺兜率岩鐵漢和尚故居和尚京山人枯坐岩竇數十年有二獼猴侍左右方坦菴拱乾少詹題其畫像云兩箇獼猴杖一根獻花石上獨稱尊怪公事事能超脫留此贓私誤子孫庚寅六月宋太宰牧仲書來言近日益治西陂得孔雀五色鸚鵡及宋槧文選杜牧之書張好好詩真迹有宣和御璽題字司馬順字燕克溫文正公裔孫宋南渡世居山隂明祭酒恂御史垔皆其後也順嘗遊黔謁先高祖忠勤祠於永寧作長歌一篇其敘述平羿蠻功尤悉庚寅四月過余里又往拜家祠賦五言古詩一章且云貴竹有二王公祠祀陽明先生暨公也二詩别録家乘雲間董原缺孝廉俞之弟也自京師寄余書略曰先生具不世出之才悟最上乘之道光焰萬丈仙佛一身天下學人如百川之赴海不肖幼侍先伯父得從仲兄蒼水論詩必首推先生全體學杜而鎔化諸家敝鄉吳日千何次張張洮侯袁價人張慧曉諸君子時時過舍亦必稱先生昆仲之詩為人天手眼後養疾吳門得見堯峰汪鈍翁先生屈指海內詩人惟新城為大家若某某但可稱名家未能比肩也云云余深愧諸良友之言而老成凋謝墓有宿草久矣可勝三歎吾家虔公誡子書云或身經三公寂爾無聞布衣寒素卿相屈體父子貴賤殊兄弟聲名異何也惟能讀數百卷書耳汝年入立境方當從宦兼有室纍何處復得下帷如王郎時耶余每感其言人生聰明智慧殊不再來尤難得者上有祖父之教中無世事之擾下無室家之纍於斯時也正當努力下帷畢志書史聰明智慧乃不誤用所謂王郎時詎可多得一旦老大悔無及矣尼父有言後生可畏焉知來者之不如今也四十五十而無聞焉斯亦不足畏也已凡吾子姓當深維此訓庶幾青箱家學不墜於地勉旃勉旃癸辛雜識又二方其一治痘倒靨色黑脣白氷冷用狗蠅七枚擂碎和醅酒調服移時即紅潤如舊其一治痘後餘毒上攻眼成內障用蛇蛻一具淨洗焙乾又天花粉等分為細末以羊子肝破開入藥在內麻皮縛定用泔水熟煮切食之良愈邑孝廉徐來順字動以方伯公凖之從子崇禎甲戌上公車闈中遇陳大士際泰問其鄉貫曰江西問姓字曰大士徐未達再扣之輒怒曰大士兩字尚不知何足與語不顧而去其傲誕如此酉陽雜俎云狼筋在䏶中大如鴨卵有犯盜者薰之令其手攣縮或云狼筋狀如織絡小囊蟲所作也寶厯中有王山人者取人本命日五更張燈相人影知休咎又有善灸人影治病者又言相寺觀當陽像可知其貧富武定袁熙宇先生諱化中明天啓中官御史劾逆閹與楊左諸公同死詔獄諡忠愍余向李翰林丹書甡麟詢其祠祀訪其子孫則八十年來未有專祠子孫寥落夷為村農丹書近考其遺事為作傳又欲醵金立祠庶少慰忠魂於地下亦使邦人有所矜式云特書以俟之錢塘王丹林字赤抒官中書舍人常賦古意四首見投曰古鼎古錦古鏡古琴託意甚深詩尤高妙為人篤於師友以病假歸遂不起惜哉萬楚五日觀伎詩最為惡劣滄溟詩格律極嚴而獨取此首殊不可解盧綸大厯十才子之冠冕而其贈駙馬都尉詩云鴛鴦殿裏參皇后龍鳯樓前拜至尊才調集顧取之尤是笑柄湯西崖右曾使黔詩多高作黔陽絶句云白白紅紅繡袂花盤絲繪蠟儘堪誇自吹木葉銀環女者卜河邊問宋家中丞席觀劇云探喉一串玉盤珠華屋神仙絶代無惱亂中丞筵上見梨園弟子李仙奴審音荀令與周郎檀板銅槽共一牀山雨乍收簾月白聽風聽水按伊涼管咽絃停意淺深雲窗六扇漏初沉已迷秦客風花路休笑吳兒木石心元瑞厯舉中州諸人特標出劉迎李汾亦是具眼然劉不稱其歌行李不舉煙波蒼蒼孟津戍一聫謬矣汪文冶洋度以復社姓氏録見寄見先贈尚書府君名不勝悲感録中所載吾邑七人吾家諸伯父居其五內王補之衮則益都人太僕少卿帶如先生瀠之弟而誤入新城者也因憶天啓中宵人造東林籍貫及點將録諸書載先伯祖太師霽宇公叔祖考功季木公姓氏今日觀之何異宣和之黨人碑乎先伯父侍御公詠梅云繁英任似火氷稜自如石南枝與北枝不作春風格陳伯璣云公忠烈之性已見於此余過襄陽賦詩云豈有鴆人羊叔子更無悔過竇連波殘碑墮淚回文錦一種銷沈可奈何首句用陸抗語次句用山谷詩皆成句唐杜牧之張好好詩并序真迹卷用硬黃紙髙一尺一寸五分長六尺四寸末闕六字與本集不同者二十許字卷首楷書唐杜牧張好好詩宣和御筆也又御書葫蘆印雙龍小璽宣和連珠印後有政和長印政和連珠印神品小印內府圖書之印董宗伯跋云樊川此書深得六朝人氣韻余所見顔栁以後若溫飛卿與牧之亦名家也愚按宣和書譜唐詩人善書者賀知章李白張籍白居易許渾司空圖吳融韓偓杜牧而不載溫飛卿然余從他處見李商隱書亦絶妙知唐人無不工書者特為詩所掩耳此卷今藏宋太宰牧仲家分甘餘話卷四
