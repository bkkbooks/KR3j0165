body:
  text: 分甘餘話卷一刑部尚書王士禎撰羣芳譜一書先祖前浙江右布政使今皇贈經筵講官刑部尚書臣象晉所著萬厯中先祖官京師為黨人所忌借丁巳京察謫官家居十載甘農圃以沒齒作為此書名亭曰二如以見志後刻於虞山毛氏汲古閣流傳已久康熈四十四年六月十二日奉聖旨開館廣續命編修臣汪灝張逸少等四人為纂修官至四十六年二月吿成凡一百卷賜名佩文齋廣羣芳譜御製序文冠於編首仍存先臣自序及每卷小序亦所不遺臣感荷聖恩榮施泉壤謹録御製并述縁起以彰異數備家乘云原任經筵講官刑部尚書臣王士禎恭紀御製廣羣芳譜序粤自神農氏甞草辨榖民始知樹藝醫藥伊耆氏命羲和推步定厯於以授時民始知耕穫之不愆而百工績熙偉哉開物成務啟牖來兹聖帝之功與天地並矣朕聴政之暇披閲典籍留意農桑繪耕織之圖製永言之什時巡所至親厯田間其稼穡之艱難作勞之辛苦既周知而洞悉矣每思究百昌生殖之理極萬變消長之情著為成編以佑吾民甞謂爾雅具其名物而郭璞陸佃孫炎之流疏注埤翼又加詳焉其明備者莫如本草自本經以迄陶𢎞景蘇頌而下數十種凡採治之法無不該核他如齊民要術月令廣義諸書其蒔植之宜為更晰矣遐稽徃牘擷其英華歸於簡括良匪易也比見近人所纂羣芳譜蒐輯衆長義類可取但惜尚多疎漏因命儒臣即祕府藏帙攟摭薈萃刪其支冗補其闕遺上原六經旁据子史洎夫稗官野乘之言才士之所歌吟田夫之所傳述皆著於篇而竒花瑞草之産於名山貢自逺徼絶塞為前代所未見聞者亦咸列焉復允廷臣之請益以朕所賦詠依類分載總一百卷命名曰佩文齋廣羣芳譜冠以天時尊嵗令也次穀次桑麻崇民事也次蔬茶果木花卉資厚生溥利用也終以藥物重民命也其諸天時早晚之候人事種溉之方地力彼此之殊物性良楛之異㒺弗條舉縷析燦然可觀焉是書也攬品彚之蕃滋想羣生之率育一展卷間化機洋溢於兹畢呈固不惟矜淹洽侈藻麗也以是刋布天下垂之久逺使吾民優游於農圃之中家室盈寧樂其業而不憚其勤而大夫士以及民之秀者因以區别物宜審其淑慝凜嗜好之常慎節宣之度於以躋仁壽而享太平亦不為無所禆助也哉康熙四十七年五月初十日青箱雜記云王安國詩好用酒樓常問予詩有幾酒樓余因憶康熈甲子奉命徃祭南海大雪渡潯陽江後二十二年作詩贈鄆城人樊祾祾善琵琶云苦竹黄蘆滿目愁嘈嘈切切似江州茫茫九派多風雪憶泊潯陽舊酒樓不知安國見之以為何如也陳倉有古賣酒樓東坡嘗賦詩余丙子再以祭告入蜀過之題一絶句云昨向宜春下苑遊曲江烟草似悲秋珠簾甲觀俱黄土何必陳倉賣酒樓故友余澹心懷詠孫楚酒樓云江南城西酒樓紅無數楊柳迎春風孫楚去後李白醉千年不見紫髯公余選入感舊集此亦二酒樓也汴中梁王吹臺一名繁臺以繁姓家於臺側故名按繁姓蒲禾切音婆漢有繁延壽魏有繁欽唐有繁知一臺以姓得名當作蒲禾切今讀作符艱切非是盧循盜賊而沙門慧逺與之友善祖約叛逆而少與阮孚齊名王丞相尤愛重之曰昨與祖士少語遂令人忘疲是皆理之不可解者杜子美贈蘇渙詩序云蘇大侍御渙靜者也渙竟煽動嶺表與哥舒晃作亂亦其類也畫墁録襄邑義塘瓜剖之色如黛而味甘如蜜余昔寄同年劉考功公㦷體仁句云側聞西湖水嫩緑如瓜瓤用此世必疑瓜瓤無黛色者矣康熙四十八年己丑廣西巡撫梁世勲進青駝二長尾猿二緑鳯緑鳩各一雙三伯祖光禄少卿養吾公象蒙萬厯庚辰進士起家陽城知縣擢監察御史官止卿寺近始見手書詩草一卷謹録四篇以存其梗概鳯音曲鳯兮鳯兮集高岡七德九苞稱至祥五音六律鳴朝陽鳴朝陽應明主非帝庭寧高舉鶴鳴曲蒼松挺挺鶴相招振翮翩翩來九霄警霜戛戛鳴九臯鳴九臯聲萬里明月來清風起瑶琴曲我㩦緑綺奏薫風一曲相思彈未終淚垂絃絶送歸鴻送歸鴻坐明月人不見心如結暮雨曲忽忽白雲羅神霄霏霏暮雨平河橋有美一人路迢遥路迢遥望無極夢相見醒相憶十叔祖翼吾公象節萬厯壬辰進士改翰林授檢討少有詩名稿今無傳惟鄭簡菴獨復先生新城舊事載其二句云古寺人來花作供孤城春盡草如烟八叔祖伯石公象艮十七叔祖季木公象春十八叔祖用晦公象明詩别詳三王公集季木公元名象巽用晦公元名象履大内南書房在乾清門内西廊下内直翰林官居之其出入皆奉旨由某門侍衛某人導引伴送壬戌後特旨内直官許於禁中乘馬至所出入之門故朱檢討彞尊紀恩詩云迴思身賤日足繭萬山中葢異數云康熈四十四年聖駕南巡至蘇州一日垂問故靈壁知縣馬驌所著繹史命大學士張玉書物色原版明年四月令人齎白金二百兩至本籍鄒平縣購版進入内府人間無從見之矣墨莊漫録云濟南為郡在厯山之隂水泉清泠凡三十餘所如舜泉爆流金線真珠孝感玉環之類皆竒李格非文叔作厯下水記叙述甚詳文體有法曾子固詩爆流作趵突未知孰是按文叔水記宋人稱之者不一而不得與洛陽名園記並傳可恨也吾郡名泉凡七十二此云三十餘者蓋未詳也黄牡丹今亳州曹縣皆有之荷花則未聞有黄色者墨莊漫録云京師五嶽觀凝祥池有黄蓮花甚竒僅見於此宋丹陽陳輔訪建康楊驥題壁絶句云北山松粉未飄花白下輕風麥脚斜身似舊時王謝燕一年一度到君家風致可愛然輔不聞有詩名若唐人任華盧延讓之屬反得傳於後名之顯晦信有數耶余嘗謂東坡鳯翔八觀詩不減杜子美宋人亦謂張芸叟鳯翔吳道子畫記不減韓退之柳耆卿卒於京口王和甫葬之然今儀真西地名仙人掌有柳墓則是葬於真州非潤州也余少在廣陵有詩云江鄉春事最堪憐寒食清明欲禁烟殘月曉風仙掌路何人為弔柳屯田余官祭酒日有送陳子文歸安邑詩云月映清淮何水部雲飛隴首柳呉興按葉石林云山抹微雲秦學士露花倒影柳屯田又李易安云露花倒影柳三變桂子飄香張九成或謂余句法本此竊自謂青出於藍後當有知之者避暑録言平生用目力常數倍於他人安得不敝因厯稽古左丘明杜子夏鄭康成高堂隆左太冲諸人皆以讀書致然余自幼小凡博奕諸戲一無所好唯嗜讀書雖官户部侍郎刑部尚書最繁劇之地下直亦手不釋書卷也自甲申歸田六年矣目力益昏始悔少壯之過用其力然老矣終亦不能廢書也唐韓翃以春城無處不飛花一詩見知九重召知制誥傳為佳話世盡知之杜陽雜編又載一事德宗西幸有二馬一號神智驄一號如意騮貞元三年蜀中進瑞鞭有麟鳯龜龍之形色類琥珀一日將幸諸苑内廄進瑞鞭上顧近臣曰昔朕西幸有二駿稱二絶今獲此鞭可稱三絶矣因吟曰鴛鴦赭白齒新齊曉日花間散碧蹄玉勒乍迴初噴沫金鞭欲下不成嘶亦翃作也知翃詩流聞禁中者多不獨寒食東風之句而已李時謙字吉爻淮安山陽人順治辛丑進士初為潞安府推官厯樂陵黎城二縣有清白名内召為監察御史號稱㢘正久之引疾里居陜西大饑特起為督糧道㕘議操守孤介不名一錢未幾卒官將軍督撫布按已下徃弔蓬蒿滿庭至無含歛之具皆為揮涕醵金買棺代為含歛而歸其喪於江淮余昔官副都御史識其為人蓋古之君子也道君時以言官建議習詩賦者杖一百有尹天民者為南京教官至之日悉取史記已下至歐陽史焚講堂下王安石之學術為害於世道人心如此又按建言者御史李彦章也疏以詩賦為元祐學術其意在黄秦晁張四學士而並劾及前代陶淵明杜子美李太白皆貶之尤可笑定律令則何執中也二人可謂失其本心無恥之尤者矣唐中宗時羣臣多應制賦詩如崔湜鄭愔宋之問輩皆人頭畜鳴張柬之等五王皆死此三人之手葢將以擁戴武三思危唐社稷與宗楚客厥罪維均乃鴟鴞之音亦溷風雅每觀唐詩至此未嘗不髮指也今朝廷凡覃恩有移贈之例謂輟已應得封典而贈本生父母也唐李德裕任荆南節度使檢校司徒平章事遇覃恩當追贈祖父乃乞迴贈其兄故楚州刺史工部侍郎德修為禮部尚書此剏例古今未聞久客見華髪孤棹桐廬歸新月無朗照落日有餘暉漁浦風水急龍山烟火微時聞沙上鴈一一皆南飛右宋初潘閬詩也高妙不減岑嘉州又夜凉疑有雨院静若無僧亦佳句故友施侍讀愚山閏章宿越州天衣寺云月照竹林早露從衣袂生亦不減閬語淳熈八年中秋節孝宗詣德壽宫太上留宴香逺堂堂東有萬嵗橋以白玉石為之雕䦨瑩徹上作四面亭皆用新羅白木與橋一色大池十餘畆植千葉白蓮御榻屏几酒器皆用水晶獨召小劉妃吹白玉笙作霓裳中序每觀此一段風景不啻明皇夢遊廣寒也今年中秋隂晦薄暮遂雨終夜淋漓不止煞風景乃爾因録此以當夢遊余少官廣陵同年義興萬雲黻錦雯罷於潜令來揚州揖罷余亟問曰還有於潜絹也無萬茫然既坐定俯首思之忽悟乃大笑茶杯幾覆醴泉寺在長白山之西西有大溪溪中多巨石紅葉時最可游憩石下産小蟹百十為羣一二寸之魚泳游其間與日影相映怳忽無定去吾别業才七八里余有詩云千林紅葉多亂此一溪水葉逝水空明魚苗可憐紫唐詩魚鱗可憐紫石根如蟹堁螯跪五銖小瑣􅖜腹中居何似清流好崔子忠字青蚓又字道母登州萊陽人居京師工畫山水人物王崇節字筠侶文貞之弟文靖季父也官把總生於閥閱而任誕不羈視富貴蔑如也畫學青蚓京師貴之故相國梁公玉立清標常以筠侣畫草蟲索題余賦二絶句云髥翁任誕如忠恕脫屣朱門傲五侯肯為尚書寫幽興碧花紅穗草堂秋一幅丹青顧野王草根纎意曲籬旁風懷磊落如公少便注蟲魚也未妨高念東先生珩作少宰日忽賦一詩題曰願作杭嚴道或訝而問之荅曰吾生平慕西湖嚴灘山水之勝聊以寄興耳官資高卑不暇計也其漫興如此宋丁謂為福建轉運使始造龍鳯團茶上供不過四十餅天聖中又造小團其品過於大團神宗時命造密雲龍其品又過於小團元祐初宣仁皇太后曰指揮建州此後更不許造密雲龍亦不要團茶揀好茶喫生得甚好意智宣仁改熈寧之政此其小者顧其言實可為萬世法士大夫家膏粱子弟尤不可不知也謹備録之唐張旭以草聖名世畫墁録云長安府錄㕔有唐吏部郎官題名碑張長史書序楷法整若軍陣云云世言長史書法傳顔魯公觀此信然吾家祖訓㕔事屏風所書心相三十六善余已於香祖筆記詳其出處惟陽宅三十六祥不記所出近始考得之乃宋曾空青語也空青名紆山谷之友元祐君子也蔣修撰虎臣超先生癸丑歿於峨眉既二十五年矣余丙子再使蜀甫入劔門闗宿於驛舎忽夢先生來迓執手㣲笑而無一語似以不二法門相示者異哉若先生者真不死也先祖方伯贈尚書府君與伯祖兵部尚書太師府君為胞兄弟太師篤信堪輿家常有數輩在客舎方伯常非之自卜兆域於高祖忠勤公塋之西恒語先贈尚書初至此地覺足下步步如登高然然實平地耳心以為吉壤即決意用之葬兩祖母夫人而太師所擇在淄川縣北距新城六十里竟無後方伯子孫衆多愚兄弟同胞四人三人成進士府君初贈户部左右侍郎累贈刑部尚書皆帶經筵講官始知術士之言不足聴而府君高見為不可及也同邑沈澄川淵先生幼時喪父太夫人欲卜吉壤不肯延致堪輿家但每夜至舎後近地縱横步之再三忽曰此即吉地也遂卜竁焉後沈公成嘉靖乙丑進士入翰林官國子司業卒以東宫講官舊勞特予祭葬崑山顧炎武號亭林揚之通州有老儒古姓號辣泉同年孟縣薛給事奮生號老峰皆地名泉名峰名連姓字巧合者亦竒古人不記有此例否當博考之異聞録言宋太平興國中編次御覽引用書一千六百九十種以今考之其無傳者十之七八矣姚鉉以祥符四年集唐文粹其序云今厯代墳籍略無亡逸觀鉉所類文集亦多不存云云當五代亂離板蕩之後而古書多存厯北宋太平全盛之世而古書反亡殊不可解豈金源入汴其兵火之厄反甚於五代時與宋張蘊為淄州兵馬監押咸平中契丹犯境有全城之功後為環州監押雖處窮邊猶建孔子廟慶厯中范文正過之書其碑隂以美之子揆掞以文學才行有名於世皆登侍從右見澠水燕談録今濟南郡城東三十里王舎人店有東坡所書讀書臺三大字石刻耕者出之田間掞遺蹟也范文正公幼隨其母客濟南長山縣而讀書長白山之醴泉寺今長山城外孝水南岸有公祠城西十五里禮㕘店公所常徃來之地後公守青州過長山父老迎候於此從曾叔祖開封太守曙峰公之都作三賢祠於市之西北隅以祀公與陳仲子伏生香火至今不絶文正集舊刻大字本編首有禮㕘店圖俗譌為李三店非也翟院深與李成皆營邱人而院深伶工也一日太守讌㑹院深擊鼓失節召問之對曰適仰見飛鴻淡佇可愛思欲圖寫凝思久之不知鼓聲之失節也院深名在宣和畫譜與史邦卿以堂吏而名列詞中大家皆竒事章邱縣西北有寗戚城春秋齊甯戚采邑今縣有甯氏尚為巨族余嘗輓從甥甯生一聯云相國悲歌扣牛角仙人暫死食飛魚次句用列仙傳甯封事皆甯氏也田侍郎綸霞雯言巡撫貴州日署中庭砌間有草結實紅如珊瑚可愛熟時有小鳥紅色羽毛甚麗來食此草問之吏卒云此斷腸草也鳥亦名斷腸鳥專以此草為食皆有大毒余觀冷齋夜話云斷腸草不可食其花美好名芙蓉花出陶貞白仙方其說稍異唐鄭綮云詩思在灞橋驢子背上胡擢云吾詩思若在三峽間聞猿聲時也余少在廣陵作論詩絶句其一云詩情合在空舲峽冷雁哀猿和竹枝用擢語也後壬子秋典蜀試歸舟下三峽夜泊空舲月下聞猿聲忽悟前詩乃知事皆前定己丑嵗自春夏至秋八月多雨書屋後叢竹甚茂雨後鵝兒鴨雛拍浮其間頗似畫本余賦絶句云紫竹林中水滿塘鵝兒得意弄輕黄襪材賸有鵞溪絹合付邊鸞與趙昌從姪磊字石丈善丹青當令補作一圖余嘗謂栁子厚漁翁夜傍西巖宿一首末二句蛇足刪作絶句乃佳東坡論此詩亦云末二句可不必老杜詩白鳥去邊明坡公詩貪㸔白鳥横秋浦不覺青林沒晚潮余少登京口北固山多景樓亦有句云高飛白鳥過江明一時即目不覺暗合洪覺範云逺公拒康樂入社而與盧循執手言笑謂逺知人則何暗於循謂不知人則何明於靈運余於此段公案固常疑之然又念逺開蓮社衆至百數十人何其多耶豈此百數十人者心盡不雜過康樂乎抑來者不拒乎宜淵明之攢眉而獨拒一康樂何說耶恨不起逺於地下而問之重陽前一日風雨觀冷齊夜話劉跛子事戲為絶句云不從勾漏覔丹砂不借飈輪轉法華祗愛青州劉跛子一年一看雒陽花又云蜂蝶蕭疎春日斜雒陽花事委泥沙野人久狎東籬菊不愛鋪堂富貴花南唐徐熙畫牡丹進御謂之鋪堂花余少與考功西樵兄言史事自十七史外如史記外則有蘇氏古史前後漢書外有荀悅袁宏兩漢紀三國志外有謝陛季漢書晉書外有崔鴻十六國春秋南北史宋齊梁陳隋諸書外有王通元經新唐書外有劉昫舊唐書范祖禹唐鑑五代史外有薛居正舊史及馬令陸游胡恢南唐書宋史外北宋有王偁東都事略曾鞏隆平集南宋有李心傳三朝朝野彚編葉紹翁四朝聞見録元史外有蘇天爵名臣事略凡此諸書皆當兼收並採不可以其不列學官而偏廢之兄亟然其言今五十餘年矣白首汗青徒有愧歎而西樵下世已三十七年己丑重陽秋霖乍霽偶憶往事援筆記此東坡廬山詩云溪聲即是廣長舌山色豈非清淨身萬厯中董思白其昌宗伯寄先大司馬太師府君詩云鐃歌即是廣長舌大纛豈非精進幢全襲坡語稍變其意耳時府君以兵部尚書視師行邊故云余常不解呉俗好尚有三鬭馬弔牌喫河豚魚敬畏五通邪神雖士大夫不能免近馬弔漸及北方又加以混江遊湖種種諸戲吾里縉紳子弟多廢學競為之不數年而貲産蕩盡至有父母之殯在堂而第宅已鬻他姓者終不悔也始作俑者安得尚方斬馬劍誅之以正人心以維惡俗乎或云宋楊文公大年好葉子戲東坡志林記杜處士蓄戴嵩畫牛一幅甚寳惜之有牧童見而笑曰牛鬭力在角尾當搐入兩股間今掉尾而鬭謬矣此與黄筌别畫鍾馗抉鬼眼精神意思俱在拇指同旨每見人家子孫留意祖父著述手澤往往不多得陸放翁記張子功樞密云先人有遺稿滿四篋字畫極難辨惟某識之某若死則皆不傳豈容不急歸耶此意今人知者蓋鮮矣余所見葉文荘與中盛遺集寫冊皆手自㸃竄鈎勒藏其裔孫文敏訒菴方藹處文敏仕為學士侍郎加尚書矣余屢勸刻之竟不果興化李映碧清廷尉丞好著書常以陸游馬令二家為經别修南唐書而以江表志釣磯立談諸書為緯尊李氏為正統其書頗可傳子木菴柟官御史大夫延余門人嘉定張雲章漢曕專司讐校之役荏苒數年竟未剞劂而木菴死矣右皆有賢子孫且官通顯而不及傳先人之書使流通於後世况其下焉者乎可歎也老學菴筆記云北方多石炭南方多木炭蜀多竹炭余詢之門人南部李曲江少司馬先復云蜀中初無竹炭不知宋時何以有之或古有之而其法不傳耶中州集載楊雲翼詩金波曾醉雁門州信有人間五月秋萬古河山雄朔部四時風月入南樓云云誠佳作也近李梅厓中丞基和代州詩云誰識雁門今夜月山川别様在氷壺亦是佳句而彼土之高凉可以想見矣金李汾長源詩烟波蒼蒼孟津戍旌旗厯厯河陽城不減少陵東坡臨邑行太僕卿邢子愿先生侗以書名萬厯間取法晉人不落唐宋窠臼其邑人王葱岳大司馬洽萃其書為來禽館帖凡數十卷時號北邢南董今董書盛行海内而邢書知之者鮮矣余西城别墅茂林修竹四大字是其真蹟陸務觀云吾鄉鏡湖為人侵耕幾盡閬州南池數百頃亦為平陸古今勝蹟往往陵谷遷移如此吾郡明湖幾分城之半四五十年前湖面甚濶近為人家佔作藕塘此疆彼界畫為溝塍舟行渠中了無烟波浩淼之趣幾何不為鏡湖南池之續耶為之一歎方嵞山文冬日林茂之前輩見過云積雪初晴鳥曬毛閒攜幼女出林臯家人莫怪兒衣薄八十五翁猶縕袍嵞山又有詩云烏衣巷口多芳草明日重過是早春亦佳句唐僖宗朝南詔請和親遣宗正少卿李龜年充使是又一李龜年一水水名也酈注渭水又東㑹一水水發呉山地里志呉山古汧山也山下石穴水溢石空懸波側注按此即一水之源在靈應峰下所謂西鎮靈湫是也余丙子祭告西鎮嘗品茶於此與西山玉泉極相似呉天章答人云自卜條南舊隠居明星玉女對攤書門前萬里崑崙水千㸃桃花尺半魚又至今堯峰上猶上堯時日又河聲過雷首雨氣下風陵西樵古意云鵁鶄兩兩栖浦沙昨夜郎來眠妾家滅燭入門戴星去看郎一似菖蒲花最質而古自科塲許五經中式而習者益衆數科以來如直𨽻陜西某某皆以五經掄元戊子江西解元李紱臨川人五經文二三塲皆刻程文悉博大精深殆有萬夫之稟今官庶常何澹菴世璂翰林云渠讀書一覽輒誦不忘也丹徒張氏吏部文選郎中九徴順治乙酉解元丁丑進士終河南督學諸子玉裁康熙丁未進士第一甲第二人及第終翰林院編修玉書文華殿大學士兼户部尚書仕可康熙丙辰進士亦以僉事為河南督學遷湖廣布政使司叅議恕可康熙戊辰進士浙江杭州府知府玉書子逸少康熙甲戌進士翰林院編修余官御史大夫時嘗蒙御筆賜一堂聯云烟霞盡入新詩卷郭邑閒開古畫圖又嘗被賜御書帶經堂信古齋二扁今分懸東西二第中堂誌聖恩示子孫不敢諠也本朝狀元必選書法之優者順治中世祖皇帝喜歐陽詢書而壬辰狀元鄒忠倚戊戌狀元孫承恩皆法歐書者也康熙以來上喜二王書而己未狀元歸允肅壬戌狀元蔡升元庚辰狀元汪繹皆法黄庭經樂毅論者也惟戊辰進士中工二王體者首推海寧查昇以其族叔嗣韓兼習五經拔置鼎甲昇遂抑置二甲丁未進士工書者首棗强宋師祁而不與鼎甲又不與吉士之選終於一令亦可惜也宋字中郎余庚午為副憲值御史内陞外轉之期時于振甲成龍莅總憲任甫三日上在暢春苑有㫖下詢于公以問余余曰臺規内陞皆論資俸近多越次躐陞徒長奔競無益勸懲今河南道常翼聖有才京畿道梅鋗有守而資俸俱深内陞之序當首常次梅則公道明人心服矣明日旨下常内陞次年梅繼之己卯余為總憲引見諸御史於乾清門御史既下殿上詢余當内陞者余力薦河南道李斯義端慎敏練是日㫖下李内陞余掌都察院一循臺規即一掌道亦必論資俸不敢徇一情面以長奔競余既遷去又不盡然矣分甘餘話卷一
